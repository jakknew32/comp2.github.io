<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFM Zone Classifier — Chiangmai Freshmilk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — single source of truth
═══════════════════════════════════════════════ */
:root {
  /* Brand */
  --brand:        #1A56DB;
  --brand-dk:     #1e40af;
  --brand-lt:     #EBF5FF;
  --brand-mid:    #BFDBFE;

  /* Semantic */
  --success:      #057A55;
  --success-lt:   #D1FAE5;
  --success-dk:   #046c4e;
  --warning:      #D03801;
  --warning-lt:   #FEF3C7;
  --danger:       #DC2626;
  --danger-lt:    #FEE2E2;

  /* Neutral */
  --gray-50:  #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-500: #6B7280;
  --gray-700: #374151;
  --gray-900: #111827;

  /* Surfaces */
  --bg-page:    #F1F5F9;
  --bg-card:    #ffffff;
  --bg-topbar:  #1e40af;
  --border:     var(--gray-200);
  --text:       var(--gray-900);
  --muted:      var(--gray-500);

  /* Typography scale */
  --text-xs:  11px;
  --text-sm:  13px;
  --text-md:  15px;
  --text-lg:  17px;
  --text-xl:  20px;
  --text-2xl: 24px;

  /* Spacing scale (4px base) */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;

  /* Radius */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-full: 9999px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  --shadow-topbar: 0 2px 8px rgba(30,64,175,.25);

  /* Zone palette — all in tokens */
  --z0-bg:#EFF6FF; --z0-fg:#1E3A8A;
  --z1-bg:#F0FDF4; --z1-fg:#14532D;
  --z2-bg:#FFF7ED; --z2-fg:#7C2D12;
  --z3-bg:#FDF4FF; --z3-fg:#581C87;
  --z4-bg:#FFF1F2; --z4-fg:#881337;
  --z5-bg:#F0FDFA; --z5-fg:#134E4A;
  --z6-bg:#FFFBEB; --z6-fg:#713F12;
  --z7-bg:#F5F3FF; --z7-fg:#3730A3;
  --z8-bg:#FEF2F2; --z8-fg:#7F1D1D;
  --z9-bg:#E0F2FE; --z9-fg:#075985;
  --z10-bg:#ECFDF5;--z10-fg:#166534;
  --z11-bg:#F3F4F6;--z11-fg:#374151;

  /* Qty colors */
  --plain-color: #1A56DB;
  --choc-color:  #7E3AF2;
  --honey-color: #D03801;
}

/* ── DARK MODE ─────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-page:   #0F172A;
    --bg-card:   #1E293B;
    --bg-topbar: #0F172A;
    --border:    #334155;
    --text:      #F1F5F9;
    --muted:     #94A3B8;
    --gray-50:   #1E293B;
    --gray-100:  #0F172A;
    --gray-200:  #334155;
    --gray-500:  #94A3B8;
    --gray-700:  #CBD5E1;
    --gray-900:  #F1F5F9;
    --brand-lt:  #1e3a6e;
    --brand-mid: #1e40af;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,.4);
    --shadow-topbar: 0 2px 8px rgba(0,0,0,.4);
    --z0-bg:#1e2d4a; --z0-fg:#93C5FD;
    --z1-bg:#14271e; --z1-fg:#6EE7B7;
    --z2-bg:#2d1a0e; --z2-fg:#FBB97A;
    --z3-bg:#1e0f2d; --z3-fg:#D8B4FE;
    --z4-bg:#2d0f14; --z4-fg:#FCA5A5;
    --z5-bg:#0e2720; --z5-fg:#5EEAD4;
    --z6-bg:#2d2108; --z6-fg:#FDE68A;
    --z7-bg:#1a1640; --z7-fg:#A5B4FC;
    --z8-bg:#2d1010; --z8-fg:#FCA5A5;
    --z9-bg:#0c2233; --z9-fg:#7DD3FC;
    --z10-bg:#0f2d1e;--z10-fg:#6EE7B7;
    --z11-bg:#1E293B;--z11-fg:#94A3B8;
    --success-lt: #14271e;
    --danger-lt:  #2d0f14;
    --warning-lt: #2d2108;
    --brand-lt:   #1e2d4a;
  }
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text); font-size: var(--text-md); line-height: 1.5; }

/* ═══════════════════════════════════════════════
   TOPBAR — redesigned with brand color + shadow
═══════════════════════════════════════════════ */
.topbar {
  background: var(--bg-topbar);
  box-shadow: var(--shadow-topbar);
  padding: 0 var(--sp-6);
  display: flex; align-items: center; gap: var(--sp-3);
  height: 56px; position: sticky; top: 0; z-index: 200;
}
.logo { display: flex; align-items: center; gap: var(--sp-2); font-weight: 700; font-size: var(--text-md); color: #fff; }
.logo svg { width: 28px; height: 28px; }
.logo-sub { font-size: var(--text-xs); color: rgba(255,255,255,.6); font-weight: 400; margin-left: 2px; }
.topbar-spacer { flex: 1; }
.topbar-btn {
  display: inline-flex; align-items: center; gap: var(--sp-1);
  padding: 6px var(--sp-3); border-radius: var(--r-md);
  font-size: var(--text-sm); font-weight: 600; cursor: pointer;
  border: none; transition: background .15s, transform .1s; white-space: nowrap;
}
.topbar-btn:active { transform: scale(.97); }
.btn-ghost { background: rgba(255,255,255,.12); color: #fff; }
.btn-ghost:hover { background: rgba(255,255,255,.22); }
.btn-export { background: var(--success); color: #fff; }
.btn-export:hover { background: var(--success-dk); }
.btn-print { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.25); }
.btn-print:hover { background: rgba(255,255,255,.22); }

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
.main { max-width: 1280px; margin: 0 auto; padding: var(--sp-6) var(--sp-4); }

/* ═══════════════════════════════════════════════
   UPLOAD ZONE
═══════════════════════════════════════════════ */
#upload-zone {
  background: var(--bg-card); border: 2px dashed var(--border);
  border-radius: var(--r-xl); padding: 48px var(--sp-6);
  text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  box-shadow: var(--shadow-sm);
}
#upload-zone:hover, #upload-zone.drag-over { border-color: var(--brand); background: var(--brand-lt); }
#upload-zone svg { width: 48px; height: 48px; color: var(--gray-300); margin-bottom: var(--sp-3); }
#upload-zone h2 { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--sp-1); color: var(--text); }
#upload-zone p { font-size: var(--text-sm); color: var(--muted); }
#file-input { display: none; }
.upload-label {
  display: inline-block; margin-top: var(--sp-4);
  padding: var(--sp-2) var(--sp-5); background: var(--brand); color: #fff;
  border-radius: var(--r-md); font-size: var(--text-sm); font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.upload-label:hover { background: var(--brand-dk); }

/* ═══════════════════════════════════════════════
   DASHBOARD — donut + summary bar
═══════════════════════════════════════════════ */
.dashboard { display: grid; grid-template-columns: 260px 1fr; gap: var(--sp-4); margin-bottom: var(--sp-5); }
@media (max-width: 720px) { .dashboard { grid-template-columns: 1fr; } }

.donut-card {
  background: var(--bg-card); border-radius: var(--r-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  padding: var(--sp-4); display: flex; flex-direction: column; align-items: center; gap: var(--sp-3);
}
.donut-title { font-size: var(--text-sm); font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.donut-wrap { position: relative; width: 160px; height: 160px; }
.donut-wrap svg { width: 160px; height: 160px; }
.donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.donut-center-num { font-size: var(--text-2xl); font-weight: 700; color: var(--text); line-height: 1; }
.donut-center-label { font-size: var(--text-xs); color: var(--muted); }
.donut-legend { width: 100%; display: flex; flex-direction: column; gap: 4px; }
.legend-row { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--text-xs); cursor: pointer; padding: 3px var(--sp-2); border-radius: var(--r-sm); transition: background .1s; }
.legend-row:hover { background: var(--gray-100); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; color: var(--text); }
.legend-count { font-weight: 700; color: var(--muted); }

.stats-panel { display: flex; flex-direction: column; gap: var(--sp-3); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: var(--sp-3); }
.stat-card {
  background: var(--bg-card); border-radius: var(--r-md);
  padding: var(--sp-4); border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.stat-num { font-size: var(--text-2xl); font-weight: 700; color: var(--brand); line-height: 1; }
.stat-label { font-size: var(--text-xs); color: var(--muted); margin-top: var(--sp-1); }

/* hidden banner แสดง filtered-out count */
.filter-info {
  background: var(--brand-lt); border: 1px solid var(--brand-mid);
  border-radius: var(--r-md); padding: var(--sp-2) var(--sp-4);
  font-size: var(--text-sm); color: var(--brand-dk);
  display: none; align-items: center; gap: var(--sp-2);
}
@media (prefers-color-scheme: dark) {
  .filter-info { color: #93C5FD; }
}

/* ═══════════════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════════════ */
.filter-bar {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: var(--sp-3) var(--sp-4);
  display: flex; align-items: center; gap: var(--sp-2);
  flex-wrap: wrap; margin-bottom: var(--sp-4);
  box-shadow: var(--shadow-sm);
}
.filter-bar label { font-size: var(--text-sm); color: var(--muted); white-space: nowrap; }
.filter-bar select, .filter-bar input[type=text], .filter-bar input[type=number] {
  border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 6px var(--sp-2); font-size: var(--text-sm);
  color: var(--text); background: var(--bg-card); outline: none;
  transition: border-color .15s;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,86,219,.15); }
#search-input { flex: 1; min-width: 150px; }
#marker-input { min-width: 180px; }
#radius-input { width: 64px; }
.filter-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px var(--sp-3); border-radius: var(--r-md);
  font-size: var(--text-sm); font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--gray-700);
  transition: background .15s;
}
.filter-btn:hover { background: var(--gray-100); }
.filter-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.filter-btn.primary:hover { background: var(--brand-dk); }
.badge-count { background: var(--brand-lt); color: var(--brand); font-size: var(--text-xs); font-weight: 700; padding: 2px var(--sp-2); border-radius: var(--r-full); white-space: nowrap; }
.geo-progress-wrap { background: var(--gray-200); border-radius: var(--r-full); height: 5px; width: 100%; overflow: hidden; display: none; margin-top: 2px; }
.geo-progress-bar { height: 5px; background: var(--brand); border-radius: var(--r-full); transition: width .3s; width: 0%; }

/* ═══════════════════════════════════════════════
   ZONE SECTIONS — sticky header
═══════════════════════════════════════════════ */
.zone-section { margin-bottom: var(--sp-6); }
.zone-header {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  border-radius: var(--r-md) var(--r-md) 0 0;
  font-weight: 700; font-size: var(--text-sm);
  /* sticky — ต่ำกว่า topbar (56px) */
  position: sticky; top: 56px; z-index: 10;
  box-shadow: 0 2px 4px rgba(0,0,0,.08);
}
.zone-cards-wrap {
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--r-md) var(--r-md);
  background: var(--bg-page); padding: var(--sp-3);
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--sp-3);
}
/* order card */
.order-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: var(--sp-4);
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: var(--sp-2);
  transition: box-shadow .15s, transform .15s;
  position: relative; overflow: hidden;
}
.order-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.order-card.is-problem { border-left: 4px solid var(--danger); }
.order-card.is-pending  { border-left: 4px solid #F59E0B; }
.order-card.is-delivered{ border-left: 4px solid var(--success); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-2); }
.card-order-id { font-family: monospace; font-size: var(--text-xs); color: var(--muted); }
.card-name { font-size: var(--text-md); font-weight: 700; color: var(--text); margin-top: 2px; }
.card-row { display: flex; align-items: flex-start; gap: var(--sp-2); font-size: var(--text-sm); color: var(--gray-700); line-height: 1.5; }
.card-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.card-products { display: flex; gap: var(--sp-3); padding: var(--sp-2) var(--sp-3); background: var(--gray-50); border-radius: var(--r-md); }
.card-qty { display: flex; align-items: center; gap: 4px; font-size: var(--text-sm); font-weight: 700; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: var(--sp-1); }

/* status badge — เด่นขึ้น ใช้สีเต็ม */
.status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-xs); padding: 4px 10px; border-radius: var(--r-full); font-weight: 700; letter-spacing: .02em; }
.s-pending  { background: #FEF3C7; color: #78350F; border: 1.5px solid #FCD34D; }
.s-delivered{ background: #D1FAE5; color: #064E3B; border: 1.5px solid #6EE7B7; }
.s-problem  { background: #FEE2E2; color: #7F1D1D; border: 1.5px solid #FCA5A5; }

.dist-badge { display: inline-flex; align-items: center; gap: 3px; font-size: var(--text-xs); padding: 3px 8px; border-radius: var(--r-full); background: #EEF2FF; color: #3730A3; font-weight: 600; }
.maps-btn { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-sm); font-weight: 600; padding: 6px var(--sp-3); border-radius: var(--r-md); background: var(--brand); color: #fff; border: none; cursor: pointer; text-decoration: none; transition: background .15s; }
.maps-btn:hover { background: var(--brand-dk); }
.maps-btn:focus { outline: 2px solid var(--brand); outline-offset: 2px; }

.zone-footer { padding: var(--sp-2) var(--sp-4); background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r-md) var(--r-md); display: flex; justify-content: flex-end; gap: var(--sp-4); font-size: var(--text-sm); }
.zone-footer span { font-weight: 700; }

/* Zone color classes */
.z0  { background: var(--z0-bg);  color: var(--z0-fg);  }
.z1  { background: var(--z1-bg);  color: var(--z1-fg);  }
.z2  { background: var(--z2-bg);  color: var(--z2-fg);  }
.z3  { background: var(--z3-bg);  color: var(--z3-fg);  }
.z4  { background: var(--z4-bg);  color: var(--z4-fg);  }
.z5  { background: var(--z5-bg);  color: var(--z5-fg);  }
.z6  { background: var(--z6-bg);  color: var(--z6-fg);  }
.z7  { background: var(--z7-bg);  color: var(--z7-fg);  }
.z8  { background: var(--z8-bg);  color: var(--z8-fg);  }
.z9  { background: var(--z9-bg);  color: var(--z9-fg);  }
.z10 { background: var(--z10-bg); color: var(--z10-fg); }
.z11 { background: var(--z11-bg); color: var(--z11-fg); }

/* ═══════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 48px var(--sp-6); color: var(--muted); font-size: var(--text-md); }
#loading { display: none; text-align: center; padding: 32px; color: var(--muted); font-size: var(--text-md); }
.spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: var(--sp-2); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════
   PRINT
═══════════════════════════════════════════════ */
@media print {
  .topbar, .filter-bar, #upload-section, #dashboard, .no-print { display: none !important; }
  body { background: #fff; font-size: 12px; color: #000; }
  .main { padding: 0; max-width: 100%; }
  .zone-section { break-inside: avoid; }
  .zone-header { position: static; box-shadow: none; }
  .zone-cards-wrap { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
  .order-card { box-shadow: none; border: 1px solid #ccc; }
  .print-title { display: block !important; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
}
.print-title { display: none; }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar no-print">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,.2)"/>
      <path d="M8 22 Q10 10 16 10 Q22 10 24 22" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="10" r="3" fill="#fff"/>
    </svg>
    CFM Zone Classifier
    <span class="logo-sub">Chiangmai Freshmilk</span>
  </div>
  <div class="topbar-spacer"></div>
  <button class="topbar-btn btn-ghost no-print" onclick="document.getElementById('upload-section').scrollIntoView({behavior:'smooth'})">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    อัปโหลด
  </button>
  <button class="topbar-btn btn-export no-print" onclick="exportExcel()" id="btn-export" style="display:none">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Export Excel
  </button>
  <button class="topbar-btn btn-print no-print" onclick="window.print()" id="btn-print" style="display:none">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    พิมพ์
  </button>
</div>

<div class="main">
  <!-- UPLOAD -->
  <div id="upload-section" class="no-print" style="margin-bottom:var(--sp-5)">
    <div id="upload-zone" onclick="document.getElementById('file-input').click()"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <h2>ลากวางหรือเลือกไฟล์ Excel</h2>

  <div class="print-title">รายงานแยกโซน — Chiangmai Freshmilk</div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard" style="display:none">
    <div class="donut-card">
      <div class="donut-title">สัดส่วนออเดอร์ตามโซน</div>

        <div class="donut-center">
          <div class="donut-center-num" id="donut-total">0</div>
          <div class="donut-center-label">ออเดอร์</div>
        </div>
      </div>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
    <div class="stats-panel">
      <div class="stats-row" id="stats-row"></div>
      <!-- filter-info banner -->
      <div class="filter-info" id="filter-info">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="filter-info-text"></span>
      </div>

  <!-- FILTER BAR -->
  <div id="filter-bar" class="filter-bar no-print" style="display:none">
    <label>โซน:</label>

    <label>สถานะ:</label>
    <select id="status-filter" onchange="applyFilter()">
      <option value="">ทั้งหมด</option>
      <option value="pending">🟡 ค้างส่ง</option>
      <option value="delivered">🟢 ส่งแล้ว</option>
      <option value="problem">🔴 มีปัญหา</option>
    </select>
    <label>ค้นหา:</label>
    <input type="text" id="search-input" placeholder="ชื่อ / เลขออเดอร์ / ที่อยู่" oninput="applyFilter()">

    <input type="number" id="radius-input" value="15" min="1" max="300">
    <button class="filter-btn primary" onclick="startGeoSearch()">ค้นหาในรัศมี</button>
    <button class="filter-btn" onclick="resetFilter()">รีเซ็ต</button>
    <span id="result-count" class="badge-count">0 รายการ</span>
    <div style="width:100%;display:flex;flex-direction:column;gap:3px">
      <span id="geo-status" style="font-size:var(--text-xs);color:var(--muted)"></span>

    </div>

  <div id="results"></div>
</div>

<script>
// ── ZONE CONFIG ──────────────────────────────────────────────
const ZONE_LIST = [
  'กรุงเทพเหนือ','กรุงเทพตะวันออก','กรุงเทพตะวันตก','กรุงเทพฝั่งธน',
  'นนทบุรี','ปทุมธานี','สมุทรสาคร','สมุทรสงคราม','นครปฐม','ชลบุรี','สมุทรปราการ','อื่นๆ'
];
const ZONE_CLASSES = ['z0','z1','z2','z3','z4','z5','z6','z7','z8','z9','z10','z11'];
// Donut colors (vivid, readable on both light/dark)
const ZONE_DONUT = [
  '#3B82F6','#10B981','#F97316','#A855F7','#F43F5E',
  '#06B6D4','#EAB308','#6366F1','#EF4444','#0EA5E9','#22C55E','#94A3B8'
];

const DZ = {};
['เขตบางเขน','เขตดอนเมือง','เขตสายไหม','เขตหลักสี่','เขตลาดพร้าว',
 'เขตจตุจักร','เขตบางซื่อ','เขตห้วยขวาง','เขตดินแดง','เขตวังทองหลาง',
 'เขตรามอินทรา','เขตบางกะปิ'].forEach(d=>DZ[d]='กรุงเทพเหนือ');
['เขตมีนบุรี','เขตลาดกระบัง','เขตสะพานสูง','เขตประเวศ','เขตบางนา',
 'เขตสวนหลวง','เขตพระโขนง','เขตคลองเตย','เขตหนองจอก','เขตคันนายาว',
 'เขตบึงกุ่ม'].forEach(d=>DZ[d]='กรุงเทพตะวันออก');
['เขตพระนคร','เขตดุสิต','เขตพญาไท','เขตปทุมวัน','เขตบางรัก',
 'เขตยานนาวา','เขตบางคอแหลม','เขตบางพลัด','เขตราษฎร์บูรณะ','เขตวัฒนา',
 'เขตสัมพันธวงศ์','เขตป้อมปราบศัตรูพ่าย','เขตจักรวรรดิ',
 'เขตบางกอกน้อย','เขตบางกอกใหญ่'].forEach(d=>DZ[d]='กรุงเทพตะวันตก');
['เขตธนบุรี','เขตคลองสาน','เขตจอมทอง','เขตบางแค','เขตหนองแขม',
 'เขตภาษีเจริญ','เขตบางบอน','เขตทวีวัฒนา','เขตตลิ่งชัน',
 'เขตบางขุนเทียน'].forEach(d=>DZ[d]='กรุงเทพฝั่งธน');
const PROVINCE_ZONE = {
  'นนทบุรี':'นนทบุรี','ปทุมธานี':'ปทุมธานี','สมุทรสาคร':'สมุทรสาคร',
  'สมุทรสงคราม':'สมุทรสงคราม','สมุทรปราการ':'สมุทรปราการ',
  'นครปฐม':'นครปฐม','ชลบุรี':'ชลบุรี',
};
function detectZone(d,p){
  for(const[k,v]of Object.entries(PROVINCE_ZONE))if(p&&p.includes(k))return v;
  if(d&&DZ[d])return DZ[d];
  if(p&&p.includes('กรุงเทพ'))return 'อื่นๆ';
  return 'อื่นๆ';
}
function formatPhone(raw){
  if(!raw)return'-';
  let s=String(raw).replace(/\.0$/,'').replace(/\D/g,'');
  if(s.startsWith('66')&&s.length===11)s='0'+s.slice(2);
  if(s.startsWith('660')&&s.length===12)s='0'+s.slice(3);
  return s||'-';
}
function classifyStatus(s){
  if(!s||['null','nan','NaT'].includes(s))return'other';
  if(s.includes('ค้าง'))return'pending';
  if(s.includes('ส่งแล้ว')||s.includes('จัดส่งแล้ว')||s.includes('ส่งสำเร็จ'))return'delivered';
  if(s.includes('ปัญหา')||s.includes('ผิดพลาด'))return'problem';
  return'other';
}

// ── ADDRESS PARSER ───────────────────────────────────────────
function parseThaiAddress(raw,district,province,zipcode){
  if(!raw||raw==='-')return null;
  let addr=raw.trim();
  const kwangIdx=addr.search(/แขวง|ตำบล/);
  let streetPart=kwangIdx>10?addr.substring(0,kwangIdx).trim():addr;
  streetPart=streetPart.replace(/\([^)]*\)/g,'').replace(/\s{2,}/g,' ').trim();
  if(streetPart.length>60)streetPart=streetPart.substring(0,60).trim();
  const distClean=(district||'').replace(/^เขต/,'').replace(/^อำเภอ/,'');
  const provClean=(province||'').replace(/^จังหวัด/,'');
  return{streetPart,distClean,provClean,zipcode};
}
function buildNominatimQueries(p){
  const{streetPart:sp,distClean:dc,provClean:pc,zipcode:z}=p;
  return[
    sp&&dc&&pc&&z?`${sp} ${dc} ${pc} ${z} Thailand`:null,
    sp&&dc&&pc  ?`${sp} ${dc} ${pc} Thailand`:null,
    dc&&pc&&z   ?`${dc} ${pc} ${z} Thailand`:null,
    dc&&pc      ?`${dc} ${pc} Thailand`:null,
  ].filter(Boolean);
}

// ── GEOCODER ────────────────────────────────────────────────
const CACHE_KEY='cfm_geo_v4';
let geoCache={};
try{geoCache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');}catch(e){}
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify(geoCache));}catch(e){}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
let lastReq=0;
async function geocodeNominatim(q){
  const ck='N4:'+q;
  if(geoCache[ck])return geoCache[ck];
  const wait=1100-(Date.now()-lastReq);
  if(wait>0)await sleep(wait);
  lastReq=Date.now();
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&accept-language=th&countrycodes=th`,{headers:{'User-Agent':'CFM-Zone/4.0'}});
    if(!res.ok)return null;
    const j=await res.json();
    if(j&&j.length>0){const r={lat:parseFloat(j[0].lat),lon:parseFloat(j[0].lon)};geoCache[ck]=r;saveCache();return r;}
  }catch(e){}
  return null;
}
async function ensureGeocoded(o){
  if(o.lat&&o.lon)return;
  const p=parseThaiAddress(o.address,o.district,o.province,o.zipcode);
  if(!p)return;
  for(const q of buildNominatimQueries(p)){
    const g=await geocodeNominatim(q);
    if(g){o.lat=g.lat;o.lon=g.lon;o.geoLevel=buildNominatimQueries(p).indexOf(q)+1;return;}
  }
}
function haversineKm(a,b,c,d){
  const R=6371,r=v=>v*Math.PI/180,dL=r(c-a),dG=r(d-b);
  const x=Math.sin(dL/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function mapsUrl(o){
  if(o.lat&&o.lon)return`https://www.google.com/maps?q=${o.lat},${o.lon}`;
  const p=parseThaiAddress(o.address,o.district,o.province,o.zipcode);
  const q=p?[p.streetPart,p.distClean,p.provClean,p.zipcode].filter(Boolean).join(' '):`${o.address} ${o.district} ${o.province}`;
  return`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
}

// ── STATE ────────────────────────────────────────────────────
let allOrders=[],filteredOrders=[],geoMarker=null;

// ── FILE HANDLING ─────────────────────────────────────────────
function onDragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('drag-over')}
function onDragLeave(){document.getElementById('upload-zone').classList.remove('drag-over')}
function onDrop(e){e.preventDefault();onDragLeave();const f=e.dataTransfer.files[0];if(f)processFile(f)}
function handleFile(e){const f=e.target.files[0];if(f)processFile(f)}

function processFile(file){
  document.getElementById('loading').style.display='block';
  document.getElementById('loading-text').textContent='กำลังอ่านไฟล์...';
  document.getElementById('results').innerHTML='';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('filter-bar').style.display='none';
  geoMarker=null;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const orders=[],seen={};
      for(let i=0;i<data.length;i++){
        const row=data[i];
        const orderNum=row[2];if(!orderNum)continue;
        if(String(orderNum).includes('สถานะ'))continue;
        const status=row[0];
        if(String(status||'').includes('คำสั่งซื้อผิด'))continue;
        const district=row[55],province=row[54],address=row[52];
        const customer=row[49],phone=row[50],note=row[51];
        const zipcode=row[56]?String(row[56]).replace(/\.0$/,''):'';
        const qty_plain=row[57],qty_choc=row[58],qty_honey=row[59];
        if(!customer&&!address)continue;
        if(!district&&!province)continue;
        const key=`${orderNum}_${i}`;
        if(!seen[key]){
          seen[key]=true;
          orders.push({
            order_id:String(orderNum),customer:String(customer||'-'),
            phone:formatPhone(phone),district:String(district||''),
            province:String(province||''),address:String(address||'-'),
            zipcode,zone:detectZone(String(district||''),String(province||'')),
            status:String(status||''),
            qty_plain:+qty_plain||0,qty_choc:+qty_choc||0,qty_honey:+qty_honey||0,
            note:note?String(note):'',
            lat:null,lon:null,_distance:null,geoLevel:null,
          });
        }
      }
      allOrders=orders;
      document.getElementById('loading').style.display='none';
      if(orders.length===0){
        document.getElementById('results').innerHTML='<div class="empty-state">ไม่พบข้อมูลออเดอร์<br><small>ตรวจสอบโครงสร้างคอลัมน์ (BD=เขต, BC=จังหวัด)</small></div>';
        return;
      }
      const zf=document.getElementById('zone-filter');
      zf.innerHTML='<option value="">ทั้งหมด</option>';
      [...new Set(orders.map(o=>o.zone))].sort().forEach(z=>{
        const opt=document.createElement('option');opt.value=z;opt.textContent=z;zf.appendChild(opt);
      });
      document.getElementById('filter-bar').style.display='flex';
      document.getElementById('btn-export').style.display='';
      document.getElementById('btn-print').style.display='';
      applyFilter();
    }catch(err){
      document.getElementById('loading').style.display='none';
      document.getElementById('results').innerHTML=`<div class="empty-state">เกิดข้อผิดพลาด: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── FILTER ───────────────────────────────────────────────────
function applyFilter(){
  const zf=document.getElementById('zone-filter').value;
  const sf=document.getElementById('status-filter').value;
  const q=document.getElementById('search-input').value.toLowerCase();
  filteredOrders=allOrders.filter(o=>{
    if(zf&&o.zone!==zf)return false;
    if(sf&&classifyStatus(o.status)!==sf)return false;
    if(q&&!`${o.order_id} ${o.customer} ${o.address} ${o.district}`.toLowerCase().includes(q))return false;
    return true;
  });
  const hidden=allOrders.length-filteredOrders.length;
  const fi=document.getElementById('filter-info');
  const ft=document.getElementById('filter-info-text');
  if(hidden>0){
    fi.style.display='flex';
    const parts=[];
    if(zf)parts.push(`โซน "${zf}"`);
    if(sf){const lbl={pending:'ค้างส่ง',delivered:'ส่งแล้ว',problem:'มีปัญหา'};parts.push(`สถานะ "${lbl[sf]||sf}"`);};
    if(q)parts.push(`ค้นหา "${q}"`);
    ft.textContent=`ซ่อน ${hidden} รายการ (filter: ${parts.join(', ')})`;
  } else {
    fi.style.display='none';
  }
  document.getElementById('result-count').textContent=`${filteredOrders.length} รายการ`;
  renderDashboard();
  renderResults();
}

function resetFilter(){
  geoMarker=null;
  allOrders.forEach(o=>o._distance=null);
  ['search-input','marker-input'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('zone-filter').value='';
  document.getElementById('status-filter').value='';
  document.getElementById('radius-input').value='15';
  document.getElementById('geo-status').textContent='';
  document.getElementById('geo-progress-wrap').style.display='none';
  applyFilter();
}

// ── GEO-SEARCH ───────────────────────────────────────────────
async function startGeoSearch(){
  const markerText=document.getElementById('marker-input').value.trim();
  const radiusKm=Number(document.getElementById('radius-input').value)||15;
  const statusEl=document.getElementById('geo-status');
  const progWrap=document.getElementById('geo-progress-wrap');
  const progBar=document.getElementById('geo-progress-bar');
  if(!markerText){statusEl.textContent='กรุณาใส่ที่อยู่หรือ lat,lng';return;}
  statusEl.textContent='กำลังค้นหาตำแหน่งหมุด...';
  progWrap.style.display='block';progBar.style.width='0%';
  const lm=markerText.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);
  if(lm){geoMarker={lat:parseFloat(lm[1]),lon:parseFloat(lm[2])};}
  else{geoMarker=await geocodeNominatim(markerText+' Thailand');}
  if(!geoMarker){statusEl.textContent='ไม่พบตำแหน่งหมุด ลองใส่เป็น lat,lng';progWrap.style.display='none';return;}
  const list=filteredOrders.length>0?filteredOrders.slice():allOrders.slice();
  let done=0;
  for(const o of list){
    await ensureGeocoded(o);
    o._distance=(o.lat&&o.lon)?haversineKm(geoMarker.lat,geoMarker.lon,o.lat,o.lon):Infinity;
    done++;
    progBar.style.width=Math.round(done/list.length*100)+'%';
    if(done%3===0)statusEl.textContent=`geocode ${done}/${list.length}...`;
  }
  filteredOrders=list.filter(o=>isFinite(o._distance)&&o._distance<=radiusKm).sort((a,b)=>a._distance-b._distance);
  document.getElementById('result-count').textContent=`${filteredOrders.length} รายการ`;
  renderDashboard();renderResults();
  progBar.style.width='100%';
  statusEl.textContent=`✓ พบ ${filteredOrders.length} รายการภายใน ${radiusKm} กม.`;
}

// ── DASHBOARD (donut + stats) ─────────────────────────────────
function renderDashboard(){
  const db=document.getElementById('dashboard');
  if(filteredOrders.length===0){db.style.display='none';return;}
  db.style.display='grid';

  // Stats
  const tP=filteredOrders.reduce((s,o)=>s+o.qty_plain,0);
  const tC=filteredOrders.reduce((s,o)=>s+o.qty_choc,0);
  const tH=filteredOrders.reduce((s,o)=>s+o.qty_honey,0);
  const zones=new Set(filteredOrders.map(o=>o.zone)).size;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-num">${filteredOrders.length}</div><div class="stat-label">ออเดอร์ทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--brand)">${zones}</div><div class="stat-label">โซนที่มีออเดอร์</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--plain-color)">${tP}</div><div class="stat-label">HP-Plain (กล่อง)</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--choc-color)">${tC}</div><div class="stat-label">HP-Choc (กล่อง)</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--honey-color)">${tH}</div><div class="stat-label">HP-Honey (กล่อง)</div></div>`;

  // Donut
  const byZone={};
  filteredOrders.forEach(o=>{byZone[o.zone]=(byZone[o.zone]||0)+1;});
  const entries=Object.entries(byZone).sort((a,b)=>b[1]-a[1]);
  const total=filteredOrders.length;
  document.getElementById('donut-total').textContent=total;

  const R=70,cx=80,cy=80,stroke=22;
  const circumference=2*Math.PI*R;
  let offset=0;
  let svgParts='';
  const legendParts=[];
  entries.forEach(([zone,count])=>{
    const zi=ZONE_LIST.indexOf(zone);
    const color=ZONE_DONUT[zi>=0?zi:11];
    const pct=count/total;
    const dash=pct*circumference;
    const gap=circumference-dash;
    // rotate so segments start from top
    const rotate=-90+(offset/circumference)*360;
    svgParts+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" style="cursor:pointer" onclick="quickFilterZone('${zone}')" title="${zone}: ${count} ออเดอร์"/>`;
    offset+=dash;
    legendParts.push(`<div class="legend-row" onclick="quickFilterZone('${zone}')">
      <div class="legend-dot" style="background:${color}"></div>
      <div class="legend-name">${zone}</div>
      <div class="legend-count">${count}</div>
    </div>`);
  });
  document.getElementById('donut-svg').innerHTML=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--gray-200)" stroke-width="${stroke}"/>${svgParts}`;
  document.getElementById('donut-legend').innerHTML=legendParts.join('');
}

function quickFilterZone(zone){
  document.getElementById('zone-filter').value=zone;
  applyFilter();
  document.getElementById('filter-bar').scrollIntoView({behavior:'smooth'});
}

// ── RENDER TABLE ─────────────────────────────────────────────
function statusBadge(s){
  const c=classifyStatus(s);
  if(c==='pending')  return`<span class="status-badge s-pending">ค้างส่ง</span>`;
  if(c==='delivered')return`<span class="status-badge s-delivered">ส่งแล้ว</span>`;
  if(c==='problem')  return`<span class="status-badge s-problem">มีปัญหา</span>`;
  if(!s||['null','nan','NaT'].includes(s))return'';
  return`<span class="status-badge" style="background:var(--gray-100);color:var(--gray-700)">${s}</span>`;
}

function renderResults(){
  const el=document.getElementById('results');
  if(filteredOrders.length===0){el.innerHTML='<div class="empty-state">ไม่พบรายการที่ตรงกัน</div>';return;}
  const byZone={};
  ZONE_LIST.forEach(z=>byZone[z]=[]);
  filteredOrders.forEach(o=>{if(!byZone[o.zone])byZone[o.zone]=[];byZone[o.zone].push(o);});
  const showDist=filteredOrders.some(o=>o._distance!==null&&isFinite(o._distance));

  let html='';
  ZONE_LIST.forEach((zone,zi)=>{
    const orders=byZone[zone];if(!orders||orders.length===0)return;
    const cls=ZONE_CLASSES[zi]||'z11';
    const tP=orders.reduce((s,o)=>s+o.qty_plain,0);
    const tC=orders.reduce((s,o)=>s+o.qty_choc,0);
    const tH=orders.reduce((s,o)=>s+o.qty_honey,0);
    html+=`<div class="zone-section">
      <div class="zone-header ${cls}">
        ${zone}
        <span class="badge-count">${orders.length} ออเดอร์</span>
        <span style="margin-left:auto;font-size:var(--text-xs);opacity:.75">
          Plain ${tP} &nbsp;·&nbsp; Choc ${tC} &nbsp;·&nbsp; Honey ${tH}
        </span>
      </div>
      <div class="zone-cards-wrap">
        ${orders.map(o=>{
          const sc=classifyStatus(o.status);
          const cardCls=sc==='problem'?'is-problem':sc==='pending'?'is-pending':sc==='delivered'?'is-delivered':'';
          const distHtml=showDist&&o._distance!==null&&isFinite(o._distance)
            ?`<span class="dist-badge">📍 ${o._distance.toFixed(1)} กม.</span>`:'' ;
          return`<div class="order-card ${cardCls}">
            <div class="card-top">
              <div>
                <div class="card-order-id">🧾 ${o.order_id}</div>
                <div class="card-name">👤 ${o.customer}</div>
              </div>
              ${statusBadge(o.status)}
            </div>
            <div class="card-row"><span class="card-icon">📞</span><span>${o.phone}</span></div>
            <div class="card-row"><span class="card-icon">📍</span><span>${o.address}${o.zipcode?` <span style="color:var(--muted);font-size:var(--text-xs)">${o.zipcode}</span>`:''} ${o.district}</span></div>
            <div class="card-products">
              <div class="card-qty" style="color:var(--plain-color)">🥛 Plain <span>${o.qty_plain||0}</span></div>
              <div class="card-qty" style="color:var(--choc-color)">🍫 Choc <span>${o.qty_choc||0}</span></div>
              <div class="card-qty" style="color:var(--honey-color)">🍯 Honey <span>${o.qty_honey||0}</span></div>
            </div>
            ${o.note?`<div class="card-row" style="color:var(--muted);font-size:var(--text-xs)">📝 ${o.note}</div>`:''}
            <div class="card-footer">
              ${distHtml}
              <a href="${mapsUrl(o)}" target="_blank" rel="noopener" class="maps-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                เปิดแผนที่
              </a>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="zone-footer">
        <div style="color:var(--plain-color)">Plain <span>${tP}</span></div>
        <div style="color:var(--choc-color)">Choc <span>${tC}</span></div>
        <div style="color:var(--honey-color)">Honey <span>${tH}</span></div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

// ── EXPORT ───────────────────────────────────────────────────
function exportExcel(){
  if(filteredOrders.length===0)return;
  const wb=XLSX.utils.book_new();
  const byZone={};ZONE_LIST.forEach(z=>byZone[z]=[]);
  filteredOrders.forEach(o=>{if(!byZone[o.zone])byZone[o.zone]=[];byZone[o.zone].push(o);});
  const sumRows=[['โซน','จำนวนออเดอร์','HP-Plain','HP-Choc','HP-Honey']];
  ZONE_LIST.forEach(zone=>{
    const orders=byZone[zone];if(!orders||orders.length===0)return;
    sumRows.push([zone,orders.length,
      orders.reduce((s,o)=>s+o.qty_plain,0),
      orders.reduce((s,o)=>s+o.qty_choc,0),
      orders.reduce((s,o)=>s+o.qty_honey,0)]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumRows),'สรุปโซน');
  ZONE_LIST.forEach(zone=>{
    const orders=byZone[zone];if(!orders||orders.length===0)return;
    const rows=[['เลขออเดอร์','ชื่อลูกค้า','เบอร์โทร','เขต','จังหวัด','รหัสไปรษณีย์','ที่อยู่','HP-Plain','HP-Choc','HP-Honey','สถานะ','หมายเหตุ'],
      ...orders.map(o=>[o.order_id,o.customer,o.phone,o.district,o.province,o.zipcode,o.address,o.qty_plain,o.qty_choc,o.qty_honey,o.status,o.note])];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[14,20,14,14,16,8,36,8,8,8,14,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,zone.replace(/[:\\\/\?\*\[\]]/g,'_').substring(0,31));
  });
  const d=new Date().toLocaleDateString('th-TH',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
  XLSX.writeFile(wb,`CFM_Zone_${d}.xlsx`);
}
