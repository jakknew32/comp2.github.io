<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetFlow — Admin (Edit Mode)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910; --s1: #0d1117; --s2: #161b27; --border: #222d40;
    --cyan: #22d3ee; --orange: #f97316; --green: #34d399; --yellow: #fbbf24; --red: #f87171;
    --text: #e2e8f0; --muted: #64748b; --font: 'Sarabun', sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 700px 400px at 5% 15%, rgba(34,211,238,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 95% 85%, rgba(249,115,22,0.04) 0%, transparent 70%);
  }
  nav { position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:58px; background:rgba(6,9,16,0.94); border-bottom:1px solid var(--border); backdrop-filter:blur(20px); }
  .logo { font-family:var(--mono); font-size:17px; font-weight:700; letter-spacing:3px; }
  .logo em { color:var(--cyan); font-style:normal; }
  .logo sup { color:var(--orange); font-size:10px; letter-spacing:1px; }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .nav-badge { background:rgba(249,115,22,0.15); border:1px solid rgba(249,115,22,0.4); color:var(--orange); padding:5px 14px; border-radius:100px; font-size:12px; font-weight:700; }
  .btn-link { color:var(--muted); font-size:13px; text-decoration:none; padding:6px 14px; border:1px solid var(--border); border-radius:8px; transition:all .2s; cursor:pointer; background:none; }
  .btn-link:hover { color:var(--cyan); border-color:var(--cyan); }
  .shell { display:grid; grid-template-columns:480px 1fr; height:calc(100vh - 58px); position:relative; z-index:1; }
  .form-side { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--border); flex-shrink:0; }
  .stat { padding:10px 14px; border-right:1px solid var(--border); text-align:center; }
  .stat-n { font-family:var(--mono); font-size:20px; font-weight:700; }
  .stat-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:1px; }
  .side-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .side-tab { flex:1; padding:13px; text-align:center; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; border:none; background:none; font-family:var(--font); position:relative; }
  .side-tab.active { color:var(--cyan); }
  .side-tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--cyan); }
  .tab-pane { flex:1; overflow:hidden; display:none; flex-direction:column; }
  .tab-pane.active { display:flex; }
  .form-scroll { flex:1; overflow-y:auto; padding:20px; }
  .f-row { margin-bottom:14px; }
  .f-row.half { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .f-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; margin-bottom:5px; display:block; }
  .f-input, .f-select, .f-textarea { width:100%; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:var(--font); font-size:13px; outline:none; }
  .f-input:focus, .f-select:focus, .f-textarea:focus { border-color:var(--cyan); }
  .btn-submit { width:100%; padding:13px; background:var(--cyan); color:#000; border:none; border-radius:10px; font-weight:700; cursor:pointer; margin-top:4px; }
  .btn-cancel { width:100%; padding:10px; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:10px; margin-top:8px; cursor:pointer; }
  .order-item { padding:13px 20px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; gap:12px; }
  .order-item.sel { background:rgba(34,211,238,0.06); border-left:2px solid var(--cyan); }
  .oi-id { font-family:var(--mono); font-size:11px; color:var(--cyan); }
  .badge { padding:3px 10px; border-radius:100px; font-size:10px; font-weight:800; }
  .b-pending { background:rgba(251,191,36,.12); color:var(--yellow); }
  .b-transit { background:rgba(34,211,238,.12); color:var(--cyan); }
  .b-delivered { background:rgba(52,211,153,.12); color:var(--green); }
  .b-failed { background:rgba(248,113,113,.12); color:var(--red); }
  .detail-wrap { padding:28px 32px; }
  .ds-title { font-size:10px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; letter-spacing:1px; }
  .ds-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .ds-row .k { color:var(--muted); }
  #toast { position:fixed; bottom:24px; right:24px; background:var(--s2); border:1px solid var(--green); padding:11px 18px; border-radius:10px; color:var(--green); opacity:0; transition:0.3s; z-index:999; pointer-events:none; }
  #toast.show { opacity:1; transform:translateY(-10px); }
  .edit-indicator { background: var(--orange); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 10px; display: inline-block; }
</style>
</head>
<body>

<nav>
  <div class="logo"><em>FLEET</em>FLOW <sup>ADMIN</sup></div>
  <div class="nav-right">
    <span class="nav-badge">🛡 แอดมิน</span>
    <a href="courier.html" class="btn-link">🛵 หน้าพนักงาน →</a>
  </div>
</nav>

<div class="shell">
  <div class="form-side">
    <div class="stats-bar" id="statsBar"></div>
    <div class="side-tabs">
      <button class="side-tab active" id="tab-form" onclick="switchTab('form',this)">➕ <span id="form-title">เพิ่มงาน</span></button>
      <button class="side-tab" id="tab-list" onclick="switchTab('list',this)">📋 รายการ</button>
    </div>

    <div class="tab-pane active" id="pane-form">
      <div class="form-scroll">
        <div id="edit-msg" style="display:none"><span class="edit-indicator">กำลังแก้ไขรายการ</span></div>
        <div class="f-row half">
          <div><span class="f-label">เลขออเดอร์</span><input class="f-input" id="f_orderid"></div>
          <div><span class="f-label">ชื่อผู้รับ *</span><input class="f-input" id="f_name"></div>
        </div>
        <div class="f-row half">
          <div><span class="f-label">เบอร์โทร</span><input class="f-input" id="f_phone"></div>
          <div><span class="f-label">น้ำหนัก (กก.)</span><input class="f-input" type="number" id="f_weight" step="0.1"></div>
        </div>
        <div class="f-row"><span class="f-label">ที่อยู่จัดส่ง *</span><input class="f-input" id="f_address"></div>
        <div class="f-row"><span class="f-label">🗺 ลิงก์ Google Maps</span><input class="f-input" id="f_maps" placeholder="วางลิงก์ที่นี่"></div>
        
        <div class="f-row">
          <span class="f-label">สินค้า (เลือกหรือระบุเอง)</span>
          <select class="f-select" id="f_item1" style="margin-bottom:5px">
            <option value="">-- เลือกรายการ --</option>
            <option value="Mulk+HighProtein จืด 10กล่อง">Mulk+HighProtein จืด 10กล่อง</option>
            <option value="Mulk+HighProtein จืด 20กล่อง">Mulk+HighProtein จืด 20กล่อง</option>
            <option value="Mulk+HighProtein ช็อกโกแลต 10กล่อง">Mulk+HighProtein ช็อกโกแลต 10กล่อง</option>
          </select>
          <textarea class="f-textarea" id="f_items_free" placeholder="หรือพิมพ์รายการสินค้าที่นี่ (1 อย่างต่อบรรทัด)"></textarea>
        </div>

        <div class="f-row half">
          <div><span class="f-label">พนักงานส่ง</span>
            <select class="f-select" id="f_courier">
              <option value="">-- ยังไม่กำหนด --</option>
              <option>สมบัติ รักงาน</option><option>วิชัย ขยันดี</option><option>นภา ส่งไว</option>
            </select>
          </div>
          <div><span class="f-label">COD (฿)</span><input class="f-input" type="number" id="f_cod"></div>
        </div>

        <button class="btn-submit" id="btn-save" onclick="saveOrder()">📦 บันทึกข้อมูล</button>
        <button class="btn-cancel" id="btn-cancel-edit" style="display:none" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
      </div>
    </div>

    <div class="tab-pane" id="pane-list">
      <div id="orderList" class="form-scroll"></div>
    </div>
  </div>

  <div class="detail-side" id="detailSide">
    <div style="padding:40px; text-align:center; color:var(--muted)">เลือกรายการเพื่อดูรายละเอียด</div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1VycVMP5o6Zwi10ZTunTPsxfvAFI3PNQ",
  authDomain: "fleet-a49df.firebaseapp.com",
  projectId: "fleet-a49df",
  databaseURL: "https://fleet-a49df-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ordersRef = ref(db, 'orders');

let orders = [];
let editMode = false;
let editFbKey = null;

// ดึงข้อมูล Realtime
onValue(ordersRef, snap => {
  const data = snap.val() || {};
  orders = Object.entries(data).map(([key, val]) => ({ ...val, _fbKey: key }));
  renderStats();
  renderList();
});

// บันทึก หรือ อัปเดต
window.saveOrder = function() {
  const o = {
    orderid: document.getElementById('f_orderid').value,
    name: document.getElementById('f_name').value,
    phone: document.getElementById('f_phone').value,
    address: document.getElementById('f_address').value,
    mapsLink: document.getElementById('f_maps').value,
    weight: document.getElementById('f_weight').value,
    cod: document.getElementById('f_cod').value,
    courier: document.getElementById('f_courier').value,
    items: [document.getElementById('f_item1').value, ...document.getElementById('f_items_free').value.split('\n')].filter(x=>x),
    status: editMode ? orders.find(x=>x._fbKey === editFbKey).status : 'pending',
    updatedAt: Date.now()
  };

  if(!o.name || !o.address) return alert('กรุณากรอกชื่อและที่อยู่');

  if(editMode) {
    update(ref(db, `orders/${editFbKey}`), o);
    showToast('✅ อัปเดตข้อมูลสำเร็จ');
    cancelEdit();
  } else {
    o.createdAt = Date.now();
    o.timeline = [{text:'รับคำสั่งจัดส่ง', time: new Date().toLocaleString('th-TH'), color:'#fbbf24'}];
    push(ordersRef, o);
    showToast('📦 เพิ่มรายการสำเร็จ');
    clearForm();
  }
};

// เข้าสู่โหมดแก้ไข
window.startEdit = function(fbKey) {
  const item = orders.find(x => x._fbKey === fbKey);
  if(!item) return;

  editMode = true;
  editFbKey = fbKey;

  // ใส่ข้อมูลลงฟอร์ม
  document.getElementById('f_orderid').value = item.orderid || '';
  document.getElementById('f_name').value = item.name || '';
  document.getElementById('f_phone').value = item.phone || '';
  document.getElementById('f_address').value = item.address || '';
  document.getElementById('f_maps').value = item.mapsLink || '';
  document.getElementById('f_weight').value = item.weight || '';
  document.getElementById('f_cod').value = item.cod || '';
  document.getElementById('f_courier').value = item.courier || '';
  document.getElementById('f_items_free').value = Array.isArray(item.items) ? item.items.join('\n') : item.items;

  // เปลี่ยน UI
  document.getElementById('form-title').innerText = "แก้ไขงาน";
  document.getElementById('btn-save').innerText = "💾 อัปเดตข้อมูล";
  document.getElementById('btn-cancel-edit').style.display = "block";
  document.getElementById('edit-msg').style.display = "block";
  
  switchTab('form', document.getElementById('tab-form'));
};

window.cancelEdit = function() {
  editMode = false;
  editFbKey = null;
  clearForm();
  document.getElementById('form-title').innerText = "เพิ่มงาน";
  document.getElementById('btn-save').innerText = "📦 บันทึกข้อมูล";
  document.getElementById('btn-cancel-edit').style.display = "none";
  document.getElementById('edit-msg').style.display = "none";
};

function clearForm() {
  ['f_orderid','f_name','f_phone','f_address','f_maps','f_weight','f_cod','f_items_free'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_item1').value = '';
  document.getElementById('f_courier').value = '';
}

window.renderList = function() {
  const list = document.getElementById('orderList');
  list.innerHTML = orders.map(o => `
    <div class="order-item" onclick="viewDetail('${o._fbKey}')">
      <div style="flex:1">
        <div class="oi-id">${o.orderid}</div>
        <div style="font-weight:600">${o.name}</div>
        <div style="font-size:11px; color:var(--muted)">${o.address}</div>
      </div>
      <div style="text-align:right">
        <span class="badge b-${o.status}">${o.status}</span>
        <div style="margin-top:8px">
          <button onclick="event.stopPropagation(); startEdit('${o._fbKey}')" style="background:none; border:none; color:var(--cyan); cursor:pointer; font-size:16px" title="แก้ไข">✎</button>
          <button onclick="event.stopPropagation(); deleteOrder('${o._fbKey}')" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; margin-left:10px" title="ลบ">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
};

window.viewDetail = function(fbKey) {
  const o = orders.find(x => x._fbKey === fbKey);
  const detail = document.getElementById('detailSide');
  detail.innerHTML = `
    <div class="detail-wrap">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="oi-id">${o.orderid}</div>
        <button onclick="startEdit('${o._fbKey}')" class="btn-link">✎ แก้ไขข้อมูล</button>
      </div>
      <h2 style="margin:10px 0">${o.name}</h2>
      <div class="ds-title">ข้อมูลจัดส่ง</div>
      <div class="ds-row"><span class="k">เบอร์โทร</span><span>${o.phone}</span></div>
      <div class="ds-row"><span class="k">ที่อยู่</span><span>${o.address}</span></div>
      <div class="ds-row"><span class="k">สินค้า</span><span>${o.items}</span></div>
      <div class="ds-row"><span class="k">พนักงาน</span><span>${o.courier || 'ไม่ระบุ'}</span></div>
      <div class="ds-row"><span class="k">COD</span><span>${o.cod} ฿</span></div>
    </div>
  `;
};

window.deleteOrder = function(key) {
  if(confirm('ยืนยันการลบรายการนี้?')) remove(ref(db, `orders/${key}`));
};

window.switchTab = function(name, btn) {
  document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
};

function renderStats() {
  const stats = document.getElementById('statsBar');
  const count = orders.length;
  const delivered = orders.filter(o => o.status === 'delivered').length;
  stats.innerHTML = `
    <div class="stat"><div class="stat-n">${count}</div><div class="stat-l">ทั้งหมด</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${delivered}</div><div class="stat-l">สำเร็จ</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--yellow)">${count - delivered}</div><div class="stat-l">ค้างส่ง</div></div>
    <div class="stat"><div class="stat-n">0</div><div class="stat-l">ปัญหา</div></div>
  `;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
