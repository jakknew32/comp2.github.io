    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const cfg = { apiKey:"AIzaSyDZolsNGRpa_ZTPco_lbaBfliXNBrjTmTo", authDomain:"photo-df51e.firebaseapp.com", databaseURL:"https://photo-df51e-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"photo-df51e", storageBucket:"photo-df51e.firebasestorage.app", messagingSenderId:"388250901051", appId:"1:388250901051:web:8a159cf4a9890eeafe1a1e" };
        const app = initializeApp(cfg), db = getDatabase(app);
        const RECEIVERS_PATH = "receivers";

        window._fbSaveReceiver = async (data) => {
            try {
                const lines = data.fullText.split('\n').map(l => l.trim()).filter(l => l);
                const phoneMatch = data.fullText.match(/(0\d{1,2}-?\d{3}-?\d{4}|0\d{8,9})/);
                const phone = phoneMatch ? phoneMatch[0].replace(/-/g, '') : '-';
                const name = lines[0] ? lines[0].replace(/^(คุณ|นาย|นาง|นางสาว)\s*/i, '') : 'ไม่ระบุชื่อ';
                const receiverId = Date.now().toString();
                
                const payload = {
                    id: receiverId,
                    name: name,
                    phone: phone,
                    address: data.fullText,
                    originalText: data.fullText,
                    documentNumber: document.getElementById('documentNumber').value,
                    createdAt: new Date().toISOString(),
                    source: 'auto-from-print-page',
                    photoPrintCount: data.isPhoto ? 1 : 0,
                    labelPrintCount: data.isLabel ? 1 : 0
                };
                await set(ref(db, `${RECEIVERS_PATH}/${receiverId}`), payload);
                return true;
            } catch (e) { return false; }
        };

        window._fbGetReceivers = async () => {
            try {
                const s = await get(ref(db, RECEIVERS_PATH));
                return s.exists() ? Object.values(s.val()).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
            } catch(e) { return []; }
        };
        
        window._fbSaveHistory  = h => set(ref(db, `history/${h.id}`), h);
        window._fbGetHistory   = async () => {
            const s = await get(ref(db, 'history'));
            return s.exists() ? Object.values(s.val()).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
        };
        window._fbDelHistory   = id => remove(ref(db, `history/${id}`));
    </script>

  e.target.value = '';
});

document.getElementById('photosPerRow').addEventListener('change',function(){photosPerRow=+this.value;renderPhotos();});
document.getElementById('pageText').addEventListener('input',function(){pageText=this.value;renderPhotos();});

function setupPaste(){
  document.addEventListener('paste',e=>{for(const i of e.clipboardData.items){if(i.type.startsWith('image/')){loadRow1(i.getAsFile());break;}}});
}
function loadRow1(file){
    if(row1Photo?.startsWith('blob:')) URL.revokeObjectURL(row1Photo);
    row1Photo = URL.createObjectURL(file);
    renderPhotos(); renderRow1Thumb();
}
function clickRow1(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{if(e.target.files[0])loadRow1(e.target.files[0]);};i.click();}
function delRow1(e){ e.stopPropagation(); if(row1Photo?.startsWith('blob:')) URL.revokeObjectURL(row1Photo); row1Photo=null; renderPhotos(); renderRow1Thumb(); }

function renderRow1Thumb(){
  const w=document.getElementById('row1Thumb'),ph=document.getElementById('r1ph'),del=document.getElementById('row1Del');
  w.querySelectorAll('img').forEach(i=>i.remove());
  if(row1Photo){const img=document.createElement('img');img.src=row1Photo;w.insertBefore(img,ph);ph.style.display='none';del.style.display='block';}
  else{ph.style.display='';del.style.display='none';}
}

function renderThumbs(){
  const s=document.getElementById('thumbnailStrip'); s.innerHTML='';
  row2Photos.forEach((src,i)=>{
    const w=document.createElement('div'); w.className='thumb-wrap';
    const img=document.createElement('img'); img.src=src; w.appendChild(img);
    const b=document.createElement('button'); b.className='thumb-del'; b.textContent='✕';
    b.onclick=ev=>{ ev.stopPropagation(); URL.revokeObjectURL(row2Photos[i]); row2Photos.splice(i,1); renderPhotos(); renderThumbs(); };
    w.appendChild(b); s.appendChild(w);
  });
}

function renderPhotos(){
  const area=document.getElementById('printArea'); area.innerHTML='';
  const total=Math.max(1,Math.ceil(row2Photos.length/photosPerRow)||1);
  for(let p=0;p<total;p++){
    const page=document.createElement('div'); page.className='a4-page';
    const r1=document.createElement('div'); r1.className='photo-row';
    const pc1=document.createElement('div'); pc1.className='photo-container full-width';
    if(row1Photo){const img=document.createElement('img'); img.src=row1Photo; img.style.cssText='width:100%;height:100%;object-fit:contain;'; pc1.appendChild(img);}
    r1.appendChild(pc1); page.appendChild(r1);
    const r2=document.createElement('div'); r2.className='photo-row';
    for(let i=0;i<photosPerRow;i++){
        const idx=p*photosPerRow+i; const pc=document.createElement('div'); pc.className='photo-container';
        if(idx<row2Photos.length){const img=document.createElement('img'); img.src=row2Photos[idx]; img.style.cssText='width:100%;height:100%;object-fit:cover;'; pc.appendChild(img);}
        r2.appendChild(pc);
    }
    page.appendChild(r2);
    if(pageText.trim()){const td=document.createElement('div'); td.className='page-text'; td.textContent=pageText; page.appendChild(td);}
    area.appendChild(page);
  }
}

async function handlePrint(){
  document.body.classList.add('print-a4'); window.print();
  const raw=document.getElementById('pageText').value.trim();
  if(raw) await window._fbSaveReceiver({ fullText: raw, isPhoto: true, isLabel: false });
  saveHistory();
  setTimeout(()=>document.body.classList.remove('print-a4'),1000);
}

function ts(){
  const n=new Date(),M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `พิมพ์: ${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()+543} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} น.`;
}

function updatePreview(){
  const rv=document.getElementById('mReceiver').value.trim();
  document.getElementById('pReceiver').textContent=rv||'กรุณากรอกข้อมูล';
  document.getElementById('pSender').textContent=SENDER;
  document.getElementById('pTs').textContent=ts();
  const qEl=document.getElementById('pQR'); qEl.innerHTML='';
  const phone = (rv.match(/(0\d{1,2}-?\d{3}-?\d{4}|0\d{8,9})/) || [''])[0].replace(/-/g,'');
  new QRCode(qEl,{text:`TEL:${phone}`,width:68,height:68});
}

async function openLabelModal(){
  const addr=document.getElementById('pageText').value.trim();
  document.getElementById('mReceiver').value=addr;
  updatePreview();
  document.getElementById('labelModal').classList.add('open');
  if(addr) await window._fbSaveReceiver({ fullText: addr, isPhoto: false, isLabel: true });
}
document.getElementById('mReceiver').addEventListener('input',updatePreview);

function printLabel(){
  const rv=document.getElementById('mReceiver').value.trim();
  const pc=document.getElementById('labelPrintContent');
  const t=ts(), phone = (rv.match(/(0\d{1,2}-?\d{3}-?\d{4}|0\d{8,9})/) || [''])[0].replace(/-/g,'');
  pc.innerHTML = `<div class="shipping-label" style="border:1mm solid #333;width:105mm;height:148mm;">
    <div class="label-hdr"><h2>Chiangmai Freshmilk</h2></div>
    <div class="label-sender">${SENDER}</div>
    <div class="label-recv"><div class="label-recv-title">ผู้รับ (TO):</div><div class="label-recv-text">${rv}</div></div>
    <div class="label-footer">
        <img src="https://github.com/jakknew32/comp2.github.io/blob/main/ddt.png?raw=true" style="width:95mm">
        <div class="label-foot-row"><div>${t}</div><div id="prtQR"></div></div>
    </div></div>`;
  new QRCode(document.getElementById('prtQR'),{text:`TEL:${phone}`,width:68,height:68});
  document.body.classList.add('print-label'); window.print();
  setTimeout(()=>document.body.classList.remove('print-label'),500);
}

async function openPicker(){
  document.getElementById('pickerModal').classList.add('open');
  const items = await window._fbGetReceivers();
  const l=document.getElementById('pickerList'); l.innerHTML='';
  items.forEach(r=>{
    const c=document.createElement('div'); c.className='recv-card';
    c.innerHTML=`<b>${r.name}</b><br>${r.phone}<br><small>${r.address}</small>`;
    c.onclick=()=>{ document.getElementById('pageText').value=r.address; renderPhotos(); closeModal('pickerModal'); };
    l.appendChild(c);
  });
}

async function openHist(){
  document.getElementById('histModal').classList.add('open');
  const items = await window._fbGetHistory();
  const l=document.getElementById('histList'); l.innerHTML='';
  items.forEach(h=>{
    const c=document.createElement('div'); c.className='hist-card';
    c.innerHTML=`<div><b>${h.documentNumber}</b> - ${h.receiverName}</div>`;
    l.appendChild(c);
  });
}

async function saveHistory(){
  const raw=document.getElementById('pageText').value.trim();
  const name=raw.split('\n')[0] || '-';
  await window._fbSaveHistory({id:Date.now().toString(), documentNumber:document.getElementById('documentNumber').value, receiverName:name, createdAt:new Date().toISOString()});
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function clearAll(){ location.reload(); }
function addFromUrl(){ const u=document.getElementById('imageUrl').value; if(u){row2Photos.push(u); renderPhotos(); renderThumbs();} }
</script>
</body>
</html>
