    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const cfg = { apiKey:"AIzaSyDZolsNGRpa_ZTPco_lbaBfliXNBrjTmTo", authDomain:"photo-df51e.firebaseapp.com", databaseURL:"https://photo-df51e-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"photo-df51e", storageBucket:"photo-df51e.firebasestorage.app", messagingSenderId:"388250901051", appId:"1:388250901051:web:8a159cf4a9890eeafe1a1e" };
        const app = initializeApp(cfg), db = getDatabase(app);
        
        window._fbSaveReceiver = async (data) => {
            try {
                const lines = data.fullText.split('\n').map(l => l.trim()).filter(l => l);
                const phoneMatch = data.fullText.match(/(0\d{1,2}-?\d{3}-?\d{4}|0\d{8,9})/);
                const phone = phoneMatch ? phoneMatch[0].replace(/-/g, '') : '-';
                const name = lines[0] || 'ไม่ระบุชื่อ';
                const id = Date.now().toString();
                await set(ref(db, `receivers/${id}`), { id, name, phone, address: data.fullText, createdAt: new Date().toISOString() });
                return true;
            } catch (e) { return false; }
        };
        window._fbGetReceivers = async () => {
            const s = await get(ref(db, 'receivers'));
            return s.exists() ? Object.values(s.val()).reverse() : [];
        };
        window._fbSaveHistory = h => set(ref(db, `history/${h.id}`), h);
        window._fbGetHistory = async () => {
            const s = await get(ref(db, 'history'));
            return s.exists() ? Object.values(s.val()).reverse() : [];
        };
        window._fbDeleteReceiver = async (id) => { await remove(ref(db, `receivers/${id}`)); };
        window._fbClearAllReceivers = async () => { await remove(ref(db, 'receivers')); };
    </script>

    document.getElementById('pageText').addEventListener('input',renderPhotos);

    function clickRow1(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{if(e.target.files[0])loadRow1(e.target.files[0]);};i.click();}
    function loadRow1(file){ row1Photo = URL.createObjectURL(file); renderPhotos(); renderRow1Thumb(); }
    function delRow1(e){ e.stopPropagation(); row1Photo=null; renderPhotos(); renderRow1Thumb(); }
    function renderRow1Thumb(){
        const w=document.getElementById('row1Thumb'),ph=document.getElementById('r1ph'),del=document.getElementById('row1Del');
        w.querySelectorAll('img').forEach(i=>i.remove());
        if(row1Photo){const img=document.createElement('img');img.src=row1Photo;w.insertBefore(img,ph);ph.style.display='none';del.style.display='block';}
        else{ph.style.display='';del.style.display='none';}
    }
    function renderThumbs(){
        const s=document.getElementById('thumbnailStrip'); s.innerHTML='';
        row2Photos.forEach((src,i)=>{
            const w=document.createElement('div'); w.className='thumb-wrap';
            w.innerHTML=`<img src="${src}"><button class="thumb-del" onclick="row2Photos.splice(${i},1);renderPhotos();renderThumbs();">✕</button>`;
            s.appendChild(w);
        });
    }

    function renderPhotos(){
        const area=document.getElementById('printArea'); area.innerHTML='';
        const total=Math.max(1,Math.ceil(row2Photos.length/photosPerRow));
        for(let p=0;p<total;p++){
            const page=document.createElement('div'); page.className='a4-page';
            const r1=document.createElement('div'); r1.className='photo-row';
            const pc1=document.createElement('div'); pc1.className='photo-container full-width';
            if(row1Photo) pc1.innerHTML=`<img src="${row1Photo}" style="object-fit:contain;">`;
            r1.appendChild(pc1); page.appendChild(r1);
            const r2=document.createElement('div'); r2.className='photo-row';
            for(let i=0; i<photosPerRow; i++){
                const idx=p*photosPerRow+i;
                const pc=document.createElement('div'); pc.className='photo-container';
                if(row2Photos[idx]) pc.innerHTML=`<img src="${row2Photos[idx]}">`;
                r2.appendChild(pc);
            }
            page.appendChild(r2);
            const txt=document.getElementById('pageText').value;
            if(txt.trim()) page.innerHTML+=`<div class="page-text">${txt.replace(/\n/g,'<br>')}</div>`;
            area.appendChild(page);
        }
    }

    function ts(){ const n=new Date(); return `พิมพ์: ${n.getDate()}/${n.getMonth()+1}/${n.getFullYear()+543} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }

    function updatePreview(){
        const rv=document.getElementById('mReceiver').value;
        document.getElementById('pReceiver').innerHTML=('คุณ '+rv).replace(/\n/g,'<br>');
        document.getElementById('pSender').textContent=SENDER;
        document.getElementById('pTs').textContent=ts();
    }

    function openLabelModal(){
        document.getElementById('mReceiver').value=document.getElementById('pageText').value;
        updatePreview();
        document.getElementById('labelModal').classList.add('open');
    }
    document.getElementById('mReceiver').addEventListener('input',updatePreview);

    function printLabel(){
        const rv=document.getElementById('mReceiver').value;
        const pc=document.getElementById('labelPrintContent');
        pc.innerHTML = `<div class="shipping-label">
            <div class="label-hdr"><h2>Chiangmai Freshmilk</h2></div>
            <div class="label-sender">${SENDER}</div>
            <div class="label-recv"><div class="label-recv-title">ผู้รับ (TO):</div><div class="label-recv-text">คุณ ${rv.replace(/\n/g,'<br>')}</div></div>
            <div class="label-footer">
                <img src="https://github.com/jakknew32/comp2.github.io/blob/main/ddt.png?raw=true">
                <div class="label-foot-row"><div>${ts()}</div></div>
            </div></div>`;
        document.getElementById('pageStyleA4').media = 'not all';
        document.getElementById('pageStyleLabel').media = 'print';
        document.body.classList.add('print-label');
        window.print();
        setTimeout(()=>{
            document.body.classList.remove('print-label');
            document.getElementById('pageStyleA4').media = 'print';
        }, 500);
        window._fbSaveReceiver({fullText:rv});
    }

    async function openPicker(){
        document.getElementById('pickerModal').classList.add('open');
        const list=await window._fbGetReceivers();
        const l=document.getElementById('pickerList'); l.innerHTML='';
        list.forEach(r=>{
            const d=document.createElement('div'); d.className='recv-card';
            d.innerHTML=`<b>${r.name}</b><br>${r.address}`;
            d.onclick=()=>{document.getElementById('pageText').value=r.address; renderPhotos(); closeModal('pickerModal');};
            l.appendChild(d);
        });
    }

    // ===== History Functions =====
    function formatThaiDate(isoStr) {
        if (!isoStr) return '';
        try {
            const d = new Date(isoStr);
            const day = d.getDate();
            const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
            const month = months[d.getMonth()];
            const year = d.getFullYear() + 543;
            const hh = String(d.getHours()).padStart(2,'0');
            const mm = String(d.getMinutes()).padStart(2,'0');
            return `${day} ${month} ${year} เวลา ${hh}:${mm} น.`;
        } catch(e) { return isoStr; }
    }

    function renderHistoryList(items) {
        const el = document.getElementById('historyList');
        const countEl = document.getElementById('historyCount');
        countEl.textContent = `ทั้งหมด ${items.length} รายการ`;

        if (items.length === 0) {
            el.innerHTML = `<div class="history-empty"><div class="he-icon">📭</div>ไม่พบข้อมูลประวัติการพิมพ์</div>`;
            return;
        }

        el.innerHTML = '';
        items.forEach(r => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.id = `hcard-${r.id}`;
            const addrPreview = (r.address || '').replace(/\n/g, ' ');
            card.innerHTML = `
                <div class="hc-icon">👤</div>
                <div class="hc-body">
                    <div class="hc-name">${escHtml(r.name || 'ไม่ระบุชื่อ')}</div>
                    <div class="hc-phone">📞 ${escHtml(r.phone || '-')}</div>
                    <div class="hc-addr">${escHtml(addrPreview)}</div>
                    <div class="hc-time">🕐 ${formatThaiDate(r.createdAt)}</div>
                </div>
                <button class="hc-use-btn" onclick="useHistoryItem(${JSON.stringify(r.address || '').replace(/"/g,'&quot;')})">ใช้ที่อยู่นี้</button>
                <button class="hc-del-btn" onclick="deleteHistoryItem('${escHtml(r.id)}')">✕</button>
            `;
            el.appendChild(card);
        });
    }

    function filterHistory() {
        const q = document.getElementById('historySearch').value.toLowerCase().trim();
        if (!q) { renderHistoryList(_historyCache); return; }
        const filtered = _historyCache.filter(r =>
            (r.name || '').toLowerCase().includes(q) ||
            (r.address || '').toLowerCase().includes(q) ||
            (r.phone || '').includes(q)
        );
        renderHistoryList(filtered);
    }

    function useHistoryItem(address) {
        document.getElementById('pageText').value = address;
        renderPhotos();
        closeModal('historyModal');
    }

    async function openHistory() {
        document.getElementById('historyModal').classList.add('open');
        document.getElementById('historySearch').value = '';
        document.getElementById('historyCount').textContent = '';
        document.getElementById('historyList').innerHTML = '<div class="history-loading">กำลังโหลดข้อมูล</div>';

        try {
            const list = await window._fbGetReceivers();
            _historyCache = list;
            renderHistoryList(list);
        } catch(e) {
            document.getElementById('historyList').innerHTML = `<div class="history-empty"><div class="he-icon">⚠️</div>เกิดข้อผิดพลาด กรุณาลองใหม่</div>`;
        }
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function deleteHistoryItem(id) {
        const card = document.getElementById(`hcard-${id}`);
        if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }
        try {
            await window._fbDeleteReceiver(id);
            _historyCache = _historyCache.filter(r => r.id !== id);
            const q = document.getElementById('historySearch').value.toLowerCase().trim();
            const filtered = q ? _historyCache.filter(r =>
                (r.name||'').toLowerCase().includes(q)||(r.address||'').toLowerCase().includes(q)||(r.phone||'').includes(q)
            ) : _historyCache;
            renderHistoryList(filtered);
        } catch(e) {
            if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
            alert('เกิดข้อผิดพลาด ไม่สามารถลบได้');
        }
    }

    async function clearAllHistory() {
        if (!confirm(`ต้องการล้างประวัติทั้งหมด ${_historyCache.length} รายการ?\nการดำเนินการนี้ไม่สามารถย้อนกลับได้`)) return;
        document.getElementById('historyList').innerHTML = '<div class="history-loading">กำลังลบข้อมูล</div>';
        try {
            await window._fbClearAllReceivers();
            _historyCache = [];
            renderHistoryList([]);
        } catch(e) {
            document.getElementById('historyList').innerHTML = `<div class="history-empty"><div class="he-icon">⚠️</div>เกิดข้อผิดพลาด กรุณาลองใหม่</div>`;
        }
    }
    // ===========================

    function handlePrint(){
        document.getElementById('pageStyleLabel').media = 'not all';
        document.getElementById('pageStyleA4').media = 'print';
        document.body.classList.add('print-a4');
        window.print();
        setTimeout(()=>{
            document.body.classList.remove('print-a4');
            document.getElementById('pageStyleLabel').media = 'print';
            document.getElementById('pageStyleA4').media = 'print';
        }, 500);
    }
    function closeModal(id){document.getElementById(id).classList.remove('open');}
</script>
</body>
</html>
