    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZolsNGRpa_ZTPco_lbaBfliXNBrjTmTo",
            authDomain: "photo-df51e.firebaseapp.com",
            databaseURL: "https://photo-df51e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "photo-df51e",
            storageBucket: "photo-df51e.firebasestorage.app",
            messagingSenderId: "388250901051",
            appId: "1:388250901051:web:8a159cf4a9890eeafe1a1e",
            measurementId: "G-Q97BD5N227"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window._saveReceiverToFirebase = async function(receiver) {
            try {
                await set(ref(db, `receivers/${receiver.id}`), receiver);
                return true;
            } catch(e) {
                console.error('Firebase save error:', e);
                return false;
            }
        };

        window._checkDuplicateInFirebase = async function(phone, address) {
            try {
                const snapshot = await get(ref(db, 'receivers'));
                if (!snapshot.exists()) return false;
                const receivers = Object.values(snapshot.val());
                return receivers.some(r =>
                    (r.phone === phone && phone !== '-') ||
                    (r.address && r.address.toLowerCase().includes(address.toLowerCase().substring(0, 20)) && address.length > 20)
                );
            } catch(e) {
                console.error('Firebase check error:', e);
                return false;
            }
        };
    </script>

<body>
    <div class="container">
        <h1>📸 ใบจ่ายชดเชยสินค้า</h1>
        
        <div class="controls">
            <div class="upload-section">
                <label class="upload-label" for="photoInput">
                    📁 Upload Photos (Row 1: Drop or Click)
                </label>
                <input type="file" id="photoInput" accept="image/*" multiple>
            </div>

            <div class="url-input-section">
                <input type="text" id="imageUrl" placeholder="Enter image URL for row 2">
                <button onclick="addImageFromUrl()" style="background: #3b82f6; color: white;">Add from URL</button>
            </div>

            <div class="photos-per-row">
                <label for="photosPerRow">Photos in row 2:</label>
                <input type="number" id="photosPerRow" min="1" max="6" value="3">
            </div>

            <div class="photos-per-row">
                <label for="pageText">Text below page:</label>
                <input type="text" id="pageText" placeholder="Enter text to display below photos">
            </div>

            <div class="photos-per-row">
                <label>เลขที่เอกสาร:</label>
                <input type="text" id="documentNumber" readonly style="background: #f9fafb; font-weight: bold; color: #667eea; font-size: 18px;">
            </div>

            <div class="button-group">
                <button class="btn-print" onclick="handlePrint()">🖨️ Print</button>
                <button class="btn-clear" onclick="clearPhotos()">🗑️ Clear All</button>
                <button onclick="createShippingLabel()" style="background: #f59e0b; color: white;">📦 สร้างฉลาก</button>
                <button class="btn-database" onclick="window.location.href='receiver-db.html'">📋 ฐานข้อมูลผู้รับ</button>
            </div>
        </div>

        <div class="print-area" id="printArea">
            <!-- Pages will be generated here -->
        </div>
    </div>

    <script>
        let row1Photo = null;
        let row2Photos = [];
        let photosPerRow = 3;
        let pageText = '';

        // Generate document number
        function generateDocumentNumber() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            
            // Get counter from localStorage
            const dateKey = `${day}${month}${year}`;
            const counterKey = `docCounter_${dateKey}`;
            let counter = parseInt(localStorage.getItem(counterKey) || '0') + 1;
            localStorage.setItem(counterKey, counter.toString());
            
            const counterStr = String(counter).padStart(3, '0');
            return `CFM${day}${month}${year}${counterStr}`;
        }

        // Initialize document number
        currentDocumentNumber = generateDocumentNumber();
        document.getElementById('documentNumber').value = currentDocumentNumber;

        document.getElementById('photoInput').addEventListener('change', handleFileSelect);
        document.getElementById('photosPerRow').addEventListener('change', function() {
            photosPerRow = parseInt(this.value);
            renderPhotos();
        });
        document.getElementById('pageText').addEventListener('input', function() {
            pageText = this.value;
            renderPhotos();
        });

        // Drag and drop for row 1
        document.addEventListener('DOMContentLoaded', function() {
            setupDragAndDrop();
            setupPaste();
        });

        function setupDragAndDrop() {
            document.addEventListener('dragover', function(e) {
                e.preventDefault();
                const target = e.target.closest('.photo-container.full-width');
                if (target) {
                    target.classList.add('drag-over');
                }
            });

            document.addEventListener('dragleave', function(e) {
                const target = e.target.closest('.photo-container.full-width');
                if (target) {
                    target.classList.remove('drag-over');
                }
            });

            document.addEventListener('drop', function(e) {
                e.preventDefault();
                const target = e.target.closest('.photo-container.full-width');
                if (target) {
                    target.classList.remove('drag-over');
                    
                    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                        const file = e.dataTransfer.files[0];
                        if (file.type.startsWith('image/')) {
                            const reader = new FileReader();
                            reader.onload = function(event) {
                                row1Photo = event.target.result;
                                renderPhotos();
                            };
                            reader.readAsDataURL(file);
                        }
                    }
                }
            });
        }

        function setupPaste() {
            document.addEventListener('paste', function(e) {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            row1Photo = event.target.result;
                            renderPhotos();
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            });
        }

        function addImageFromUrl() {
            const url = document.getElementById('imageUrl').value.trim();
            if (url) {
                row2Photos.push(url);
                document.getElementById('imageUrl').value = '';
                renderPhotos();
            }
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        row2Photos.push(e.target.result);
                        renderPhotos();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function renderPhotos() {
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            const totalPages = Math.max(1, Math.ceil(row2Photos.length / photosPerRow));

            for (let pageNum = 0; pageNum < totalPages; pageNum++) {
                const page = createPage();
                const startIdx = pageNum * photosPerRow;
                const endIdx = Math.min(startIdx + photosPerRow, row2Photos.length);

                // Row 1: Single full-width photo with drag/drop support
                const row1 = document.createElement('div');
                row1.className = 'photo-row';
                
                const photo1Container = document.createElement('div');
                photo1Container.className = 'photo-container full-width';
                
                if (row1Photo) {
                    const img = document.createElement('img');
                    img.src = row1Photo;
                    photo1Container.appendChild(img);
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'photo-placeholder';
                    placeholder.innerHTML = 'Drop image, Paste (Ctrl+V), or Click to upload';
                    photo1Container.appendChild(placeholder);
                }
                
                // Click to upload for row 1
                photo1Container.addEventListener('click', function() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(event) {
                                row1Photo = event.target.result;
                                renderPhotos();
                            };
                            reader.readAsDataURL(file);
                        }
                    };
                    input.click();
                });
                
                row1.appendChild(photo1Container);
                page.appendChild(row1);

                // Row 2: Multiple photos based on photosPerRow
                const row2 = document.createElement('div');
                row2.className = 'photo-row';

                for (let i = 0; i < photosPerRow; i++) {
                    const photoIdx = startIdx + i;
                    const photoContainer = document.createElement('div');
                    photoContainer.className = 'photo-container';

                    if (photoIdx < endIdx) {
                        const img = document.createElement('img');
                        img.src = row2Photos[photoIdx];
                        photoContainer.appendChild(img);
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'photo-placeholder';
                        placeholder.textContent = 'Empty';
                        photoContainer.appendChild(placeholder);
                    }

                    row2.appendChild(photoContainer);
                }

                page.appendChild(row2);

                // Add text below page if provided
                if (pageText.trim() !== '') {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'page-text';
                    textDiv.textContent = pageText;
                    page.appendChild(textDiv);
                }

                printArea.appendChild(page);
            }
        }

        function createPage() {
            const page = document.createElement('div');
            page.className = 'a4-page';
            return page;
        }

        function clearPhotos() {
            row1Photo = null;
            row2Photos = [];
            document.getElementById('photoInput').value = '';
            document.getElementById('imageUrl').value = '';
            renderPhotos();
        }

        function handlePrint() {
            if (!row1Photo && row2Photos.length === 0) {
                showToast('ยังไม่มีรูปภาพ กรุณาอัปโหลดรูปก่อนปริ้น', 'warning');
                return;
            }
            window.print();
            showToast('ส่งงานพิมพ์แล้ว! หากยังไม่ได้บันทึก กรุณากด 📦 สร้างฉลาก เพื่อบันทึกข้อมูล', 'info', 5000);
        }

        async function createShippingLabel() {
            const address = document.getElementById('pageText').value.trim();
            
            // Save to Firebase database
            if (address) {
                await saveToReceiverDatabase(address);
            }
            
            showShippingLabelModal(address);
        }

        // =============================================
        // Toast Notification
        // =============================================
        function showToast(message, type = 'success', duration = 4000) {
            const existing = document.getElementById('cfm-toast');
            if (existing) existing.remove();

            const colors = {
                success: { bg: '#10b981', icon: '✅' },
                info:    { bg: '#667eea', icon: 'ℹ️' },
                warning: { bg: '#f59e0b', icon: '⚠️' },
                error:   { bg: '#ef4444', icon: '❌' }
            };
            const c = colors[type] || colors.success;

            const toast = document.createElement('div');
            toast.id = 'cfm-toast';
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                transform: translateX(120%);
                background: ${c.bg};
                color: white;
                padding: 14px 20px;
                border-radius: 10px;
                font-family: 'Kanit', sans-serif;
                font-size: 15px;
                font-weight: 600;
                box-shadow: 0 6px 24px rgba(0,0,0,0.25);
                z-index: 99999;
                max-width: 320px;
                transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.35s ease;
                opacity: 0;
            `;
            toast.innerHTML = `${c.icon} ${message}`;
            document.body.appendChild(toast);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                toast.style.transform = 'translateX(0)';
                toast.style.opacity = '1';
            }));

            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 350);
            }, duration);
        }

        // =============================================
        // Save to Firebase Receiver Database
        // =============================================
        async function saveToReceiverDatabase(fullText) {
            const lines = fullText.split('\n').map(line => line.trim()).filter(line => line);
            if (lines.length === 0) return;

            let phone = '', name = '', address = '', notes = '';
            const phonePattern = /(\d{3}[-\s]?\d{3}[-\s]?\d{4}|\d{10}|0\d{1,2}[-\s]?\d{3,4}[-\s]?\d{4})/;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const phoneMatch = line.match(phonePattern);
                if (phoneMatch && !phone) {
                    phone = phoneMatch[0];
                    if (i > 0 && !name) name = lines[i - 1].replace(/^(คุณ|นาย|นาง|นางสาว)\s*/i, '');
                    if (i < lines.length - 1) address = lines.slice(i + 1).join(' ');
                    break;
                }
            }

            if (!phone) {
                name = lines[0].replace(/^(คุณ|นาย|นาง|นางสาว)\s*/i, '');
                if (lines.length > 1) {
                    const secondLinePhone = lines[1].match(phonePattern);
                    if (secondLinePhone) {
                        phone = secondLinePhone[0];
                        address = lines.slice(2).join(' ');
                    } else {
                        address = lines.slice(1).join(' ');
                    }
                }
            }

            const notesPattern = /(หมายเหตุ|note|notes|โน้ต)[:：]?\s*(.+)/i;
            const notesMatch = fullText.match(notesPattern);
            if (notesMatch) {
                notes = notesMatch[2];
                address = address.replace(notesPattern, '').trim();
            }

            if (!name) name = lines[0] || 'ไม่ระบุชื่อ';
            if (!phone) phone = '-';
            if (!address) address = fullText;

            // Check duplicate in Firebase
            const isDuplicate = window._checkDuplicateInFirebase
                ? await window._checkDuplicateInFirebase(phone, address)
                : false;

            if (!isDuplicate) {
                const newReceiver = {
                    id: Date.now().toString(),
                    name: name,
                    phone: phone,
                    address: address,
                    notes: notes,
                    originalText: fullText,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    source: 'auto-from-print-page',
                    documentNumber: currentDocumentNumber,
                    row1Photo: row1Photo || null,
                    row2Photos: row2Photos.slice()
                };

                if (window._saveReceiverToFirebase) {
                    const ok = await window._saveReceiverToFirebase(newReceiver);
                    if (ok) {
                        showToast(`บันทึกข้อมูล "${name}" ลง Firebase สำเร็จ! 🔥`, 'success');
                    } else {
                        showToast('เกิดข้อผิดพลาด ไม่สามารถบันทึกลง Firebase ได้', 'error');
                    }
                }
            } else {
                showToast(`ข้อมูลผู้รับนี้มีอยู่แล้วในระบบ`, 'info', 3000);
            }
        }

        function showShippingLabelModal(receiverAddress) {
            // Remove existing modal if any
            const existingModal = document.getElementById('shippingLabelModal');
            if (existingModal) {
                existingModal.remove();
            }

            // Create modal overlay
            const modal = document.createElement('div');
            modal.id = 'shippingLabelModal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
                padding: 20px;
            `;
            
            const defaultSender = `บริษัท เชียงใหม่เฟรชมิลค์ จำกัด 57/1 ม.6 ต.ท่าวังตาล สารภี เชียงใหม่ โทร. 089-6354687`;
            let displayReceiver = receiverAddress || 'กรุณากรอกข้อมูลผู้รับ';
            if (receiverAddress && !receiverAddress.startsWith('คุณ')) {
                displayReceiver = 'คุณ ' + receiverAddress;
            }

            const now = new Date();
            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 
                               'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const day = now.getDate();
            const month = thaiMonths[now.getMonth()];
            const year = now.getFullYear() + 543;
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timestamp = `พิมพ์: ${day} ${month} ${year} เวลา ${hours}:${minutes} น. | Chiangmai Freshmilk`;
            
            modal.innerHTML = `
                <div style="background: white; border-radius: 15px; padding: 30px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin: 0; color: #333; font-family: 'Sarabun', sans-serif;">📦 Chiangmai Freshmilk</h2>
                        <button onclick="closeShippingLabelModal()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Sarabun', sans-serif;">✕ ปิด</button>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-family: 'Sarabun', sans-serif;">📥 แก้ไขข้อมูลผู้รับ:</label>
                        <textarea id="modalReceiverInfo" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-family: 'Sarabun', 'Tahoma', sans-serif; min-height: 100px; box-sizing: border-box;">${receiverAddress || ''}</textarea>
                    </div>
                    
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div id="labelPreview" style="width: 101.6mm; height: 152.4mm; border: 3mm solid #333; background: white; padding: 6mm 6mm 3mm 6mm; margin: 0 auto; display: inline-flex; flex-direction: column; font-family: 'Kanit', 'Sarabun', 'Tahoma', sans-serif; box-sizing: border-box; position: relative; overflow: hidden; line-height: 1.4; -webkit-print-color-adjust: exact; print-color-adjust: exact;">
                            <img src="https://img2.pic.in.th/13223.png" alt="watermark" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(30deg); width: 80mm; opacity: 0.12; pointer-events: none; z-index: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact;" onerror="this.style.display='none'">
                            <div style="position: relative; z-index: 1; text-align: center; border-bottom: 2px solid #333; padding: 3mm 0 2mm 0; margin-bottom: 3mm;">
                                <h2 style="font-size: 24px; font-weight: bold; margin: 0; color: #000;"><img src="https://mms.img.susercontent.com/th-11134216-7ras8-m6i01ncx41rrab" style="width: 40px; height: 40px; vertical-align: middle; margin-right: 5px; -webkit-print-color-adjust: exact; print-color-adjust: exact;" onerror="this.style.display='none'">Chiangmai Freshmilk</h2>
                            </div>
                            
                            <div style="position: relative; z-index: 1; margin-bottom: 3mm; padding-bottom: 3mm; border-bottom: 1px dashed #999;">
                                <div style="font-size: 14px; line-height: 1.4; color: #333;">${defaultSender}</div>
                            </div>
                            
                            <div style="position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; margin-bottom: 3mm;">
                                <div style="font-weight: bold; font-size: 16px; margin-bottom: 2mm; color: #000; background: #f0f0f0; padding: 2mm; border-radius: 3px;">ผู้รับ (TO):</div>
                                <div id="modalReceiverDisplay" style="font-size: 14px; line-height: 1.6; color: #000; white-space: pre-line; flex: 1; word-wrap: break-word; word-break: break-word;">${displayReceiver}</div>
                            </div>
                            
                            <div style="position: relative; z-index: 1; margin-top: auto; padding-top: 2mm; border-top: 2px solid #333; text-align: center;">
                                <div style="margin-bottom: 2mm;">
                                    <img src="https://github.com/jakknew32/comp2.github.io/blob/main/ddt.png?raw=true" alt="Warning" style="width: 95mm; height: auto; max-width: 100%; -webkit-print-color-adjust: exact; print-color-adjust: exact;" onerror="this.style.display='none'">
                                </div>
                                <div style="font-size: 12px; color: #666;">${timestamp}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button onclick="printShippingLabel()" style="flex: 1; background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif;">🖨️ พิมพ์ฉลาก</button>
                        <button onclick="closeShippingLabelModal()" style="flex: 1; background: #6b7280; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif;">ยกเลิก</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Update receiver display when typing
            setTimeout(() => {
                const modalReceiverInfo = document.getElementById('modalReceiverInfo');
                if (modalReceiverInfo) {
                    modalReceiverInfo.addEventListener('input', function() {
                        let receiver = this.value.trim();
                        if (receiver && !receiver.startsWith('คุณ')) {
                            receiver = 'คุณ ' + receiver;
                        }
                        const displayEl = document.getElementById('modalReceiverDisplay');
                        if (displayEl) {
                            displayEl.textContent = receiver || 'กรุณากรอกข้อมูลผู้รับ';
                        }
                    });
                }
            }, 100);
        }

        window.closeShippingLabelModal = function() {
            const modal = document.getElementById('shippingLabelModal');
            if (modal) {
                modal.remove();
            }
        }

        window.printShippingLabel = function() {
            const labelPreview = document.getElementById('labelPreview');
            if (!labelPreview) return;
            
            const printWindow = window.open('', '', 'width=812,height=600');
            if (!printWindow) {
                alert('⚠️ โปรดปิดการบล็อก pop-up ของเบราว์เซอร์เพื่อพิมพ์ฉลาก');
                return;
            }
            
            const htmlContent = `
                <!DOCTYPE html>
                <html lang="th">
                <head>
                    <meta charset="UTF-8">
                    <title>ฉลากจัดส่ง - Chiangmai Freshmilk</title>
                    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
                    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
                    <style>
                        @page {
                            size: 101.6mm 152.4mm;
                            margin: 0;
                            padding: 0;
                        }
                        * {
                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                        }
                        html, body {
                            margin: 0;
                            padding: 0;
                            width: 101.6mm;
                            height: 152.4mm;
                            font-family: 'Kanit', 'Sarabun', 'Tahoma', sans-serif;
                            background: white;
                        }
                        body {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                        }
                        #labelPreview, #labelPreview * {
                            font-family: 'Kanit', 'Sarabun', 'Tahoma', sans-serif !important;
                        }
                        #labelPreview {
                            width: 101.6mm !important;
                            height: 152.4mm !important;
                            border: 3mm solid #333 !important;
                            background: white !important;
                            padding: 6mm 6mm 3mm 6mm !important;
                            display: flex !important;
                            flex-direction: column !important;
                            box-sizing: border-box !important;
                            overflow: hidden !important;
                            margin: 0 !important;
                            flex-shrink: 0;
                        }
                        img {
                            max-width: 100%;
                            height: auto;
                        }
                    </style>
                </head>
                <body>
                    ${labelPreview.outerHTML}
                    <script>
                        let fontsLoaded = false;
                        let imagesLoaded = false;
                        let readyToPrint = false;
                        
                        // Wait for fonts to load
                        if (document.fonts && document.fonts.ready) {
                            document.fonts.ready.then(() => {
                                fontsLoaded = true;
                                checkReadyToPrint();
                            });
                        } else {
                            fontsLoaded = true;
                        }
                        
                        // Wait for images to load
                        function checkImagesLoaded() {
                            const images = document.querySelectorAll('img');
                            let loadedCount = 0;
                            let totalImages = images.length;
                            
                            if (totalImages === 0) {
                                imagesLoaded = true;
                                checkReadyToPrint();
                                return;
                            }
                            
                            images.forEach(img => {
                                if (img.complete) {
                                    loadedCount++;
                                    if (loadedCount === totalImages) {
                                        imagesLoaded = true;
                                        checkReadyToPrint();
                                    }
                                } else {
                                    img.addEventListener('load', () => {
                                        loadedCount++;
                                        if (loadedCount === totalImages) {
                                            imagesLoaded = true;
                                            checkReadyToPrint();
                                        }
                                    });
                                    img.addEventListener('error', () => {
                                        loadedCount++;
                                        if (loadedCount === totalImages) {
                                            imagesLoaded = true;
                                            checkReadyToPrint();
                                        }
                                    });
                                }
                            });
                        }
                        
                        function checkReadyToPrint() {
                            if (fontsLoaded && imagesLoaded && !readyToPrint) {
                                readyToPrint = true;
                                setTimeout(() => {
                                    window.print();
                                }, 200);
                            }
                        }
                        
                        window.onafterprint = function() {
                            setTimeout(() => {
                                window.close();
                            }, 100);
                        }
                        
                        // Start checking images
                        window.addEventListener('load', checkImagesLoaded);
                        
                        // Fallback: print anyway after 2 seconds
                        setTimeout(() => {
                            if (!readyToPrint) {
                                readyToPrint = true;
                                window.print();
                            }
                        }, 2000);
                    <\/script>
                </body>
                </html>
            `;
            
            try {
                printWindow.document.write(htmlContent);
                printWindow.document.close();
                showToast('🖨️ ตั้งค่าฉลากจัดส่ง...', 'info');
            } catch (error) {
                console.error('Print error:', error);
                showToast('❌ เกิดข้อผิดพลาดในการพิมพ์', 'error');
            }
        }

        // Initialize with empty page
        renderPhotos();

        // Check if there's receiver address from database page
        window.addEventListener('DOMContentLoaded', () => {
            // Check for receiver address from photo modal
            const savedAddress = sessionStorage.getItem('receiverAddress');
            if (savedAddress) {
                document.getElementById('pageText').value = savedAddress;
                pageText = savedAddress;
                renderPhotos();
                sessionStorage.removeItem('receiverAddress');
            }
        });
    </script>
</body>
</html>
