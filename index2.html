<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ FootLive — ตารางแข่งฟุตบอล</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161d; --bg3: #1a1e28;
  --surface: #1e2230; --surface2: #252a38;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #f0f2f8; --muted: #8892aa; --dim: #4a5268;
  --accent: #3b82f6; --accent2: #1d4ed8;
  --live: #ef4444; --live-bg: rgba(239,68,68,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.header { padding: 1.5rem; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: 1px; }
.btn-refresh { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.btn-refresh:hover { background: var(--surface2); }
.container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
.match-card { background: var(--surface); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1rem; }
.team { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem; }
.team img { width: 60px; height: 60px; object-fit: contain; }
.score-area { text-align: center; }
.score { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--accent); }
.time { font-size: 0.9rem; color: var(--muted); }
.live-badge { background: var(--live-bg); color: var(--live); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; display: inline-block; }
.error { text-align: center; padding: 3rem; color: var(--muted); }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">FOOTLIVE</div>
  <div>
    <small style="color:var(--muted)">อัปเดตล่าสุด: <span id="last-updated">-</span></small>
    <button class="btn-refresh" onclick="refresh()"><span>🔄</span> รีเฟรช</button>
  </div>
</div>

<div class="container" id="container">
  <div class="error">กำลังโหลดข้อมูล...</div>
</div>

<script>
const PROXY = 'api.php';
let allEvents = [];

async function refresh() {
  const container = document.getElementById('container');
  const btn = document.querySelector('.btn-refresh span');
  btn.style.display = 'inline-block';
  btn.style.animation = 'spin 1s linear infinite';

  try {
    const today = new Date().toISOString().split('T')[0];
    const [liveRes, todayRes] = await Promise.all([
      fetch(`${PROXY}?action=live`).then(r => r.json()),
      fetch(`${PROXY}?action=today&date=${today}`).then(r => r.json())
    ]);

    const liveEvents = (liveRes.events || []).map(e => ({...e, _isLive: true}));
    const scheduledEvents = (todayRes.events || []).filter(e => 
      !liveEvents.some(l => l.idEvent === e.idEvent)
    );

    allEvents = [...liveEvents, ...scheduledEvents];
    render(allEvents);

    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('th-TH');
  } catch (err) {
    container.innerHTML = `<div class="error">เกิดข้อผิดพลาด: ${err.message}</div>`;
  } finally {
    btn.style.animation = '';
  }
}

function render(events) {
  const container = document.getElementById('container');
  if (events.length === 0) {
    container.innerHTML = '<div class="error">ไม่มีรายการแข่งขันในขณะนี้</div>';
    return;
  }

  container.innerHTML = events.map(e => `
    <div class="match-card">
      <div class="team">
        <img src="https://www.thesportsdb.com/images/media/team/badge/small/${e.idHomeTeam}.png" onerror="this.src='https://via.placeholder.com/60?text=TEAM'">
        <span>${e.strHomeTeam}</span>
      </div>
      <div class="score-area">
        ${e._isLive ? '<span class="live-badge">LIVE</span>' : ''}
        <div class="score">${e.intHomeScore ?? '-'}:${e.intAwayScore ?? '-'}</div>
        <div class="time">${e.strTime ? e.strTime.substring(0, 5) : 'N/A'}</div>
        <div style="font-size:0.7rem; color:var(--dim); margin-top:5px;">${e.strLeague}</div>
      </div>
      <div class="team">
        <img src="https://www.thesportsdb.com/images/media/team/badge/small/${e.idAwayTeam}.png" onerror="this.src='https://via.placeholder.com/60?text=TEAM'">
        <span>${e.strAwayTeam}</span>
      </div>
    </div>
  `).join('');
}

window.addEventListener('DOMContentLoaded', refresh);
</script>

</body>
</html>
