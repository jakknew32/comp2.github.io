<!DOCTYPE html>
<html lang="th">
<head>
<style>
  /* เพิ่มสไตล์สำหรับเวลาที่สำเร็จ */
  .delivered-time {
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>

<script type="module">
// ... (Firebase Config ส่วนเดิม) ...

// แก้ไขฟังก์ชัน changeStatus ให้บันทึกเวลาเมื่อสำเร็จ
window.changeStatus = (fbKey, newStatus) => {
  const statusLabels = { pending:'รอส่ง', transit:'กำลังส่ง', delivered:'สำเร็จ', failed:'ไม่สำเร็จ' };
  if(confirm(`ยืนยันการเปลี่ยนสถานะเป็น [${statusLabels[newStatus]}] ?`)) {
    let updateData = { status: newStatus };
    
    if (newStatus === 'delivered') {
      // บันทึกเวลาปัจจุบันเมื่อกดสำเร็จ
      const now = new Date();
      updateData.deliveredAt = now.toLocaleString('th-TH', {
        day: '2-digit', month: 'short', year: '2-digit',
        hour: '2-digit', minute: '2-digit'
      }) + " น.";
    } else {
      // หากเปลี่ยนจากสำเร็จกลับไปเป็นอย่างอื่น ให้ลบเวลาสำเร็จออก (Optional)
      updateData.deliveredAt = null;
    }
    
    update(ref(db, 'orders/'+fbKey), updateData)
      .then(() => showToast('✅ อัปเดตสถานะแล้ว'))
      .catch(err => alert('Error: ' + err));
  } else {
    renderCards();
  }
};

function renderCards(){
  // ... (Logic การกรองข้อมูลส่วนเดิม) ...

  const html = filtered.reverse().map(o => {
    // ... (การคำนวณวันเวลาส่วนเดิม) ...

    return `
    <div class="delivery-card ${o.status}">
      <div class="card-head">
        <div>
          <div class="card-id">#${o.orderid || o._fbKey.substring(0,6)}</div>
          <div class="card-date">🕒 รับงาน: ${orderDate.toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} น.</div>
          <div class="card-name">${o.name || 'ไม่ระบุชื่อ'}</div>
          
          ${o.status === 'delivered' && o.deliveredAt ? 
            `<div class="delivered-time">✅ สำเร็จเมื่อ: ${o.deliveredAt}</div>` : ''}
        </div>
        <div class="status-badge ${st.c}">${st.t}</div>
      </div>
      <div class="card-body">
        <div class="info-row">📍 ${o.address || '-'}</div>
        <div class="info-row">📞 <a href="tel:${o.phone}" style="color:var(--orange); font-weight:800;">${o.phone || '-'}</a></div>
        
        <div class="product-box">
          ${Array.isArray(o.items) ? o.items.map((it,i)=>`<span class="product-item">${i+1}. ${it}</span>`).join('') : `<span class="product-item">${o.items||'-'}</span>`}
        </div>
        
        ${o.status !== 'delivered' ? `
          <div class="due-tag ${isOverdue ? 'overdue' : ''}">
            ${isOverdue ? '⚠️ เลยกำหนดส่ง!' : '📅 กำหนด: ' + dueDate.toLocaleDateString('th-TH')}
          </div>
        ` : ''}
      </div>
      <div class="card-foot">
        <select class="status-select" onchange="changeStatus('${o._fbKey}',this.value)">
          <option value="pending" ${o.status==='pending'?'selected':''}>⏳ รอส่ง</option>
          <option value="transit" ${o.status==='transit'?'selected':''}>🚚 กำลังส่ง</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>✅ สำเร็จ</option>
          <option value="failed" ${o.status==='failed'?'selected':''}>❌ ไม่สำเร็จ</option>
        </select>
        ${o.mapsLink ? `<a href="${o.mapsLink}" target="_blank" class="btn-map">แผนที่</a>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('mainGrid').innerHTML = html || '<div style="text-align:center;padding:50px;color:var(--muted)">ไม่พบรายการ</div>';
}
// ... (ส่วนที่เหลือคงเดิม) ...
</script>
</body>
</html>
