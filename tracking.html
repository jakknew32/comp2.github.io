<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFM TRACKING — ระบบติดตามพัสดุ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #F85903;
            --orange-bg: #FFF5F0;
            --gray-light: #F8FAF7;
            --text-dark: #1E293B;
            --text-muted: #64748B;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: #F1F5F9; color: var(--text-dark); padding: 15px; line-height: 1.5; }

        .container { max-width: 480px; margin: 0 auto; }
        
        .header { text-align: center; margin: 25px 0; }
        .header h1 { color: var(--orange); font-size: 32px; font-weight: 800; }
        .header p { color: var(--text-muted); font-size: 14px; }

        .search-card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-label { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .search-input-group { display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 14px 18px; border-radius: 15px; border: 2px solid #F1F5F9; font-family: inherit; font-size: 16px; outline: none; background: #F8FAFC; transition: 0.3s; }
        .search-input:focus { border-color: var(--orange); background: white; }
        .btn-search { background: var(--orange); color: white; border: none; padding: 0 20px; border-radius: 15px; cursor: pointer; font-weight: 700; transition: 0.2s; }

        #resultArea { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .messenger-box { background: white; border: 1px solid #E2E8F0; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .m-icon { font-size: 28px; background: var(--orange-bg); padding: 10px; border-radius: 50%; }
        .m-info b { font-size: 12px; color: var(--text-muted); display: block; }
        .m-info a { font-size: 18px; font-weight: 700; color: var(--text-dark); text-decoration: none; }

        .status-card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid #E2E8F0; }
        .order-meta { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #F1F5F9; }
        .order-id { font-size: 14px; color: var(--orange); font-weight: 700; }
        .customer-name { font-size: 22px; font-weight: 700; }
        .address { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        /* Timeline */
        .timeline { margin: 25px 0; padding-left: 30px; position: relative; }
        .timeline::before { content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 2px; background: #E2E8F0; }
        .step { position: relative; margin-bottom: 25px; }
        .step::after { content: ''; position: absolute; left: -30px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: #CBD5E1; border: 3px solid white; box-shadow: 0 0 0 2px #F1F5F9; z-index: 2; }
        
        /* สถานะสำเร็จ (เขียว) */
        .step.done::after { background: #10B981; box-shadow: 0 0 0 2px #D1FAE5; }
        
        /* สถานะปัจจุบัน (ส้ม + กระพริบ) */
        .step.active::after { background: var(--orange); box-shadow: 0 0 0 4px var(--orange-bg); animation: pulse-orange 1.5s infinite; }
        
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0px rgba(248, 89, 3, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(248, 89, 3, 0); }
            100% { box-shadow: 0 0 0 0px rgba(248, 89, 3, 0); }
        }

        .step-title { font-weight: 700; font-size: 16px; }
        .step.active .step-title { color: var(--orange); }
        .step-date { font-size: 12px; color: var(--text-muted); }

        /* Product List */
        .prod-section { margin-top: 25px; }
        .prod-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
        .prod-item { display: flex; align-items: center; gap: 15px; background: #F8FAFC; padding: 12px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #EDF2F7; }
        .prod-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; background: white; flex-shrink: 0; }
        .prod-name { font-size: 14px; font-weight: 600; color: #334155; }

        #loader { display: none; text-align: center; color: var(--orange); font-weight: 700; padding: 20px; }
        #errorMsg { display: none; text-align: center; color: #EF4444; background: #FEF2F2; padding: 15px; border-radius: 15px; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CFM TRACKING</h1>
        <p>ตรวจสอบสถานะการจัดส่งพัสดุของคุณ</p>
    </div>

    <div class="search-card">
        <label class="search-label">ระบุหมายเลขคำสั่งซื้อ</label>
        <div class="search-input-group">
            <input type="text" id="orderQuery" class="search-input" placeholder="ระบุเลขออเดอร์ของ Shopee" autocomplete="off">
            <button class="btn-search" onclick="trackOrder()">ค้นหา</button>
        </div>
    </div>

    <div id="loader">⏳ กำลังตรวจสอบข้อมูล...</div>
    <div id="errorMsg">❌ ไม่พบหมายเลขพัสดุนี้ กรุณาตรวจสอบอีกครั้ง</div>

    <div id="resultArea">
        <div class="messenger-box">
            <div class="m-icon">🛵</div>
            <div class="m-info">
                <b>พนักงานจัดส่ง</b>
                <a href="tel:0941150250">คุณบุ๊ค 094-115-0250</a>
            </div>
        </div>

        <div class="status-card">
            <div class="order-meta">
                <div class="order-id" id="displayId">#------</div>
                <div class="customer-name" id="displayName">คุณลูกค้า</div>
                <div class="address" id="displayAddress">ที่อยู่จัดส่ง...</div>
            </div>

            <div class="timeline" id="timelineList"></div>

            <div class="prod-section">
                <div class="prod-title">รายการสินค้า</div>
                <div id="displayItems"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1VycVMP5o6Zwi10ZTunTPsxfvAFI3PNQ",
        authDomain: "fleet-a49df.firebaseapp.com",
        projectId: "fleet-a49df",
        storageBucket: "fleet-a49df.firebasestorage.app",
        messagingSenderId: "324785731593",
        appId: "1:324785731593:web:b24e7977a2cccac01b60d8",
        databaseURL: "https://fleet-a49df-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.trackOrder = () => {
        const q = document.getElementById('orderQuery').value.trim().replace('#','');
        if(!q) return;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';

        onValue(ref(db, 'orders'), (snap) => {
            document.getElementById('loader').style.display = 'none';
            const data = snap.val();
            let found = null;

            if(data) {
                Object.entries(data).forEach(([key, val]) => {
                    if(String(val.orderid) === q || key.startsWith(q)) found = val;
                });
            }

            if(found) {
                renderData(found);
                document.getElementById('resultArea').style.display = 'block';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }, { onlyOnce: true });
    };

    function renderData(o) {
        document.getElementById('displayId').innerText = 'ORDER #' + (o.orderid || '------');
        document.getElementById('displayName').innerText = 'คุณ' + (o.name || 'ลูกค้า');
        document.getElementById('displayAddress').innerText = '📍 ' + (o.address || '-');

        // ฟังก์ชันเลือกรูปตามเงื่อนไข (ปรับปรุงใหม่ตามลำดับความสำคัญ)
        const getImg = (itemName) => {
            const name = String(itemName);
            
            if (name.includes('ช็อกโกแลต')) {
                return 'https://github.com/jakknew32/comp.github.io/blob/main/S__38543433.jpg?raw=true';
            }

            if (name.includes('จืด')) {
                return 'https://github.com/jakknew32/comp.github.io/blob/main/S__25329682_0.jpg?raw=true';
            }

            if (name.includes('น้ำผึ้ง')) {
                return 'https://github.com/jakknew32/comp.github.io/blob/main/MULK%20HP%20(BKK_CNX)%20copy@2x_0-1080x1080.png?raw=true';
            }
            
            // รูป Default กรณีไม่เข้าเงื่อนไข
            return 'https://c8.alamy.com/comp/EAXHA7/an-failed-red-ink-stamp-on-a-white-background-EAXHA7.jpg';
        };

        const items = Array.isArray(o.items) ? o.items : [o.items];
        document.getElementById('displayItems').innerHTML = items.map(it => `
            <div class="prod-item">
                <img src="${getImg(it)}" class="prod-img" referrerpolicy="no-referrer">
                <div class="prod-name">${it}</div>
            </div>
        `).join('');

        // Timeline Setup
        const status = o.status; // pending, transit, delivered
        const steps = [
            { id: 'pending', t: 'รับคำสั่งซื้อเรียบร้อย', d: o.createdAt },
            { id: 'transit', t: 'พนักงานกำลังนำส่งพัสดุ', d: o.transitAt },
            { id: 'delivered', t: 'จัดส่งสำเร็จ', d: o.deliveredAt }
        ];

        document.getElementById('timelineList').innerHTML = steps.map(s => {
            let cls = '';
            // ถ้าถึงจุดสิ้นสุดแล้ว (delivered) ทุกจุดที่ผ่านคือ done
            if(status === 'delivered') {
                cls = 'done';
            } 
            // ถ้ากำลังส่ง (transit) จุดแรกคือ done จุดที่สองคือ active
            else if(status === 'transit') {
                if(s.id === 'pending') cls = 'done';
                if(s.id === 'transit') cls = 'active';
            } 
            // ถ้าเพิ่งรับคำสั่ง (pending) จุดแรกคือ active
            else {
                if(s.id === 'pending') cls = 'active';
            }

            let dateShow = '';
            if(s.d) {
                const dt = new Date(s.d);
                dateShow = isNaN(dt) ? s.d : dt.toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) + ' น.';
            }

            return `
                <div class="step ${cls}">
                    <div class="step-title">${s.t}</div>
                    <div class="step-date">${dateShow}</div>
                </div>
            `;
        }).join('');
    }
</script>

</body>
</html>
